[tool.ruff]
# Target Python version
target-version = "py311"

# Line length
line-length = 120

# Exclude directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "migrations",
    "node_modules",
    "dist",
    "build",
]

[tool.ruff.lint]
# Enable pycodestyle (E), pyflakes (F), isort (I), and more
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "DJ",     # flake8-django
]

# Ignore specific rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (needed for Django)
    "B904",   # Within an except clause, raise exceptions with raise ... from err
    "DJ001",  # Avoid null=True on string fields - existing codebase pattern
    "DJ012",  # Model ordering style - keep existing code style
    "DJ007",  # Do not use __all__ with ModelForm - keep existing pattern
    "F403",   # Star imports - used in Django settings (from .base import *)
    "F405",   # Names from star imports - used in Django settings
]

[tool.ruff.lint.per-file-ignores]
# Allow unused imports in __init__.py for Django admin autodiscovery
"__init__.py" = ["F401"]
# Allow unused variables in tests (test fixtures)
"test_*.py" = ["F841"]
"tests.py" = ["F841"]

[tool.ruff.lint.isort]
known-first-party = [
    # New layout: business apps live under `apps`, project config under `config`.
    "apps",
    "config",
    "common",
    # Legacy top-level names, kept first-party during the apps/ migration so
    # imports stay in one block while apps are moved incrementally.
    "core",
    "system_intelligence",
    "authn",
    "cms",
    "event",
    "news",
    "projects",
    "mail",
    "sheets",
    "sponsors",
]

[tool.ruff.format]
# Use double quotes
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Unix-style line endings
line-ending = "lf"

# Bandit SAST. Runs over src/ in CI via .github/workflows/lint.yml with
# --baseline .bandit-baseline.json so only *new* findings fail. Patterns
# are fnmatch-style: use `*/tests/*` (not `*/tests`) so files *inside*
# tests directories are excluded.
[tool.bandit]
exclude_dirs = [
    "*/tests/*",
    "*/migrations/*",
    "*/management/commands/*",
    "*/__pycache__/*",
    ".venv",
    "staticfiles",
    "node_modules",
]
skips = [
    # assert_used — asserts inside application code are intentional
    # (e.g., type-narrowing invariants).
    "B101",
]

# Coverage.py configuration (read via `coverage[toml]`). CI runs
# `coverage run --source="apps.<app>"` per app, so these settings shape what
# counts toward coverage for every app.
[tool.coverage.run]
branch = false
omit = [
    # Migrations are byte-for-byte managed by Django and forbidden to edit;
    # their RunPython data-migration code is not meaningfully unit-testable.
    "*/migrations/*",
    # Test modules should not measure their own coverage (circular).
    "*/tests/*",
    "*/test_*.py",
    "*/tests.py",
    # Project entrypoints / config that run outside the test process.
    "*/wsgi.py",
    "*/asgi.py",
    "manage.py",
]

[tool.coverage.report]
# Lines that are intentionally unreachable in the test process. Mark genuinely
# untestable code with `# pragma: no cover` and justify it inline.
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@(abc\\.)?abstractmethod",
    "^\\s*\\.\\.\\.\\s*$",
]
show_missing = true
skip_covered = false
