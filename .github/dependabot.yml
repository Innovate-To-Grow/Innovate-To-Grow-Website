version: 2
updates:
  # Python backend
  - package-ecosystem: pip
    directory: /src
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      aws:
        patterns:
          - "boto3"
          - "django-storages"
      django:
        patterns:
          - "Django"
          - "djangorestframework*"
          - "django-*"
    ignore:
      # Python 3.12-only from these versions on; the project targets 3.11.
      # Keep in sync with the comments in src/requirements/{base,production}.txt.
      - dependency-name: "django-unfold"
        versions: [">=0.92"]
      - dependency-name: "django-redis"
        versions: [">=6.0"]
      # google-adk pins opentelemetry-api<=1.41.1; the otel trio must stay <1.42
      # until google-adk lifts that pin (see src/requirements/base.txt comments).
      - dependency-name: "opentelemetry-api"
        versions: [">=1.42"]
      - dependency-name: "opentelemetry-sdk"
        versions: [">=1.42"]
      - dependency-name: "opentelemetry-exporter-otlp-proto-http"
        versions: [">=1.42"]

  # React/Vite frontend
  - package-ecosystem: npm
    directory: /pages
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
    ignore:
      # The eslint 10 major must move together with eslint core and
      # typescript-eslint; bundle that migration manually.
      - dependency-name: "@eslint/js"
        versions: [">=10"]

  # Archived event-pages Flask app
  - package-ecosystem: pip
    directory: /archive/page
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - archive
      - python
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Backend container base image
  - package-ecosystem: docker
    directory: /src
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions used across workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps)"
      include: scope
