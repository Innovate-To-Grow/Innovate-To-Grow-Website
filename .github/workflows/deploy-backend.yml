name: Deploy Backend to AWS ECS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-west-2' }}
  ECR_REPOSITORY: itg-backend
  ECS_CLUSTER: itg-backend-cluster
  ECS_SERVICE: itg-backend-service
  ECS_TASK_DEFINITION: aws/task-definition.json
  CONTAINER_NAME: itg-backend

jobs:
  deploy:
    name: Build & Deploy Backend
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: AWS ECS - Prod
      url: https://api.i2g.ucmerced.edu

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required deployment configuration
        env:
          DJANGO_SECRET_KEY_SECRET_ARN: ${{ vars.DJANGO_SECRET_KEY_SECRET_ARN || secrets.DJANGO_SECRET_KEY_SECRET_ARN }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD_SECRET_ARN: ${{ vars.DB_PASSWORD_SECRET_ARN || secrets.DB_PASSWORD_SECRET_ARN }}
          AWS_STORAGE_BUCKET_NAME: ${{ vars.AWS_STORAGE_BUCKET_NAME || 'itg-static-assets' }}
          BACKEND_URL: ${{ vars.BACKEND_URL || vars.VITE_API_BASE_URL }}
          ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN || secrets.ECS_EXECUTION_ROLE_ARN }}
          ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN || secrets.ECS_TASK_ROLE_ARN }}
        run: |
          missing=()
          for name in DJANGO_SECRET_KEY_SECRET_ARN DB_HOST DB_NAME DB_USER DB_PASSWORD_SECRET_ARN AWS_STORAGE_BUCKET_NAME BACKEND_URL ECS_EXECUTION_ROLE_ARN ECS_TASK_ROLE_ARN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required config: ${missing[*]}"
            exit 1
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and tag Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" src/
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # SECURITY: Production secret values must live in AWS Secrets Manager
      # or SSM Parameter Store. This workflow renders only valueFrom ARNs into
      # the ECS task definition so DescribeTaskDefinition cannot reveal secret
      # material. Configure *_SECRET_ARN repository/environment variables or
      # GitHub secrets with the AWS secret/parameter ARNs.

      - name: Upload Django static assets to S3
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          AWS_STORAGE_BUCKET_NAME: ${{ vars.AWS_STORAGE_BUCKET_NAME || 'itg-static-assets' }}
          AWS_S3_REGION_NAME: ${{ vars.AWS_S3_REGION_NAME || 'us-west-2' }}
        run: |
          set -euo pipefail

          # Extract baked static files from the image and sync to S3.
          # This avoids Django's collectstatic S3 backend which requires
          # s3:DeleteObject permissions we intentionally withhold from the
          # deploy user.
          CONTAINER_ID=$(docker create "$IMAGE_URI")
          docker cp "$CONTAINER_ID:/app/static" ./static-export
          docker rm "$CONTAINER_ID"

          aws s3 sync ./static-export "s3://${AWS_STORAGE_BUCKET_NAME}/static" \
            --region "${AWS_S3_REGION_NAME}" \
            --cache-control "max-age=86400" \
            --size-only

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Render ECS task definition from template
        id: task-def
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          DJANGO_SECRET_KEY_SECRET_ARN: ${{ vars.DJANGO_SECRET_KEY_SECRET_ARN || secrets.DJANGO_SECRET_KEY_SECRET_ARN }}
          DB_ENGINE: ${{ vars.DB_ENGINE }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD_SECRET_ARN: ${{ vars.DB_PASSWORD_SECRET_ARN || secrets.DB_PASSWORD_SECRET_ARN }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_CONN_MAX_AGE: ${{ vars.DB_CONN_MAX_AGE || '0' }}
          DB_CONN_HEALTH_CHECKS: ${{ vars.DB_CONN_HEALTH_CHECKS || 'true' }}
          REDIS_URL_SECRET_ARN: ${{ vars.REDIS_URL_SECRET_ARN || secrets.REDIS_URL_SECRET_ARN }}
          WEB_CONCURRENCY: ${{ vars.WEB_CONCURRENCY || '2' }}
          UVICORN_LIMIT_CONCURRENCY: ${{ vars.UVICORN_LIMIT_CONCURRENCY || '20' }}
          DJANGO_SUPERUSER_USERNAME: ${{ vars.DJANGO_SUPERUSER_USERNAME || secrets.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_EMAIL: ${{ vars.DJANGO_SUPERUSER_EMAIL || secrets.DJANGO_SUPERUSER_EMAIL }}
          DJANGO_SUPERUSER_PASSWORD_SECRET_ARN: ${{ vars.DJANGO_SUPERUSER_PASSWORD_SECRET_ARN || secrets.DJANGO_SUPERUSER_PASSWORD_SECRET_ARN }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://i2g.ucmerced.edu' }}
          BACKEND_URL: ${{ vars.BACKEND_URL || vars.VITE_API_BASE_URL }}
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          DJANGO_ALLOWED_HOSTS: ${{ vars.DJANGO_ALLOWED_HOSTS }}
          CSRF_TRUSTED_ORIGINS: ${{ vars.CSRF_TRUSTED_ORIGINS }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          AWS_STORAGE_BUCKET_NAME: ${{ vars.AWS_STORAGE_BUCKET_NAME || 'itg-static-assets' }}
          AWS_S3_REGION_NAME: ${{ vars.AWS_S3_REGION_NAME || 'us-west-2' }}
          ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN || secrets.ECS_EXECUTION_ROLE_ARN }}
          ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN || secrets.ECS_TASK_ROLE_ARN }}
        run: |
          python - <<'PY'
          import json
          import os
          from urllib.parse import urlparse

          template_path = "aws/task-definition.json"
          output_path = "rendered-task-definition.json"
          empty_sentinels = {"__EMPTY__", "__UNSET__", "null", "None"}

          def env_value(name: str, default: str = "") -> str:
              value = os.environ.get(name, default)
              if value is None:
                  return ""
              return "" if value in empty_sentinels else value

          with open(template_path, "r", encoding="utf-8") as f:
              taskdef = json.load(f)

          frontend_url = env_value("FRONTEND_URL").strip()
          api_base_url = env_value("API_BASE_URL").strip()

          csrf_origins = env_value("CSRF_TRUSTED_ORIGINS").strip()
          if not csrf_origins:
              csrf_values = [x for x in [frontend_url, api_base_url] if x]
              csrf_origins = ",".join(csrf_values)

          cors_origins = env_value("CORS_ALLOWED_ORIGINS").strip() or frontend_url

          configured_allowed_hosts = env_value("DJANGO_ALLOWED_HOSTS").strip()
          hosts = [host.strip() for host in configured_allowed_hosts.split(",") if host.strip()]
          for origin in [api_base_url, frontend_url]:
              parsed = urlparse(origin)
              if parsed.hostname:
                  hosts.append(parsed.hostname)
          if not configured_allowed_hosts:
              hosts.extend([".cloudfront.net", ".elb.amazonaws.com"])
          allowed_hosts = ",".join(dict.fromkeys([h for h in hosts if h]))

          mapping = {
              "__DJANGO_ALLOWED_HOSTS__": allowed_hosts,
              "__DB_NAME__": env_value("DB_NAME"),
              "__DB_USER__": env_value("DB_USER"),
              "__DB_HOST__": env_value("DB_HOST"),
              "__DB_PORT__": env_value("DB_PORT", "5432"),
              "__DB_CONN_MAX_AGE__": env_value("DB_CONN_MAX_AGE", "0"),
              "__DB_CONN_HEALTH_CHECKS__": env_value("DB_CONN_HEALTH_CHECKS", "true"),
              "__WEB_CONCURRENCY__": env_value("WEB_CONCURRENCY", "2"),
              "__UVICORN_LIMIT_CONCURRENCY__": env_value("UVICORN_LIMIT_CONCURRENCY", "20"),
              "__CSRF_TRUSTED_ORIGINS__": csrf_origins,
              "__CORS_ALLOWED_ORIGINS__": cors_origins,
              "__FRONTEND_URL__": frontend_url,
              "__BACKEND_URL__": env_value("BACKEND_URL"),
              "__AWS_STORAGE_BUCKET_NAME__": env_value("AWS_STORAGE_BUCKET_NAME", "itg-static-assets"),
              "__AWS_S3_REGION_NAME__": env_value("AWS_S3_REGION_NAME", "us-west-2"),
              "__DJANGO_SUPERUSER_USERNAME__": env_value("DJANGO_SUPERUSER_USERNAME"),
              "__DJANGO_SUPERUSER_EMAIL__": env_value("DJANGO_SUPERUSER_EMAIL"),
          }
          secret_mapping = {
              "__DJANGO_SECRET_KEY_SECRET_ARN__": env_value("DJANGO_SECRET_KEY_SECRET_ARN"),
              "__DB_PASSWORD_SECRET_ARN__": env_value("DB_PASSWORD_SECRET_ARN"),
              "__REDIS_URL_SECRET_ARN__": env_value("REDIS_URL_SECRET_ARN"),
              "__DJANGO_SUPERUSER_PASSWORD_SECRET_ARN__": env_value("DJANGO_SUPERUSER_PASSWORD_SECRET_ARN"),
          }
          required_secret_placeholders = {
              "__DJANGO_SECRET_KEY_SECRET_ARN__",
              "__DB_PASSWORD_SECRET_ARN__",
          }

          # Substitute IAM role ARNs so the account ID is not baked into the
          # checked-in task-definition template.
          exec_role = env_value("ECS_EXECUTION_ROLE_ARN").strip()
          task_role = env_value("ECS_TASK_ROLE_ARN").strip()
          if not exec_role:
              raise SystemExit("ECS_EXECUTION_ROLE_ARN is required to render the ECS task definition.")
          if not task_role:
              raise SystemExit("ECS_TASK_ROLE_ARN is required to render the ECS task definition.")
          taskdef["executionRoleArn"] = exec_role
          taskdef["taskRoleArn"] = task_role

          container = taskdef["containerDefinitions"][0]
          container["image"] = os.environ["IMAGE_URI"]

          for item in container.get("environment", []):
              value = item.get("value", "")
              if value in mapping:
                  item["value"] = mapping[value]

          rendered_secrets = []
          for item in container.get("secrets", []):
              value_from = item.get("valueFrom", "")
              if value_from not in secret_mapping:
                  rendered_secrets.append(item)
                  continue

              secret_arn = secret_mapping[value_from].strip()
              if not secret_arn:
                  if value_from in required_secret_placeholders:
                      raise SystemExit(f"{value_from.strip('_')} is required to render the ECS task definition.")
                  continue

              item["valueFrom"] = secret_arn
              rendered_secrets.append(item)
          container["secrets"] = rendered_secrets

          # Optional DB_ENGINE override; prod defaults to PostgreSQL if unset.
          db_engine = env_value("DB_ENGINE").strip()
          if db_engine:
              container["environment"].append({"name": "DB_ENGINE", "value": db_engine})

          with open(output_path, "w", encoding="utf-8") as f:
              json.dump(taskdef, f, indent=2)
          PY
          echo "task-definition=rendered-task-definition.json" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment was not rolled back
        env:
          QUERY_PRIMARY: 'services[0].deployments[?status==`PRIMARY`].taskDefinition | [0]'
          QUERY_EVENTS: 'services[0].events[0:5].message'
        run: |
          set -euo pipefail

          expected_taskdef="${{ steps.deploy-ecs.outputs.task-definition-arn }}"
          echo "Expected task definition: $expected_taskdef"

          # Get the primary deployment's task definition
          active_taskdef="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query "$QUERY_PRIMARY" \
            --output text)"
          echo "Active task definition:   $active_taskdef"

          if [ "$active_taskdef" != "$expected_taskdef" ]; then
            echo "::error::Deployment rolled back! Expected $expected_taskdef but service is running $active_taskdef"
            echo "Checking recent ECS events for failure details..."
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query "$QUERY_EVENTS" \
              --output table
            exit 1
          fi

          echo "Deployment verified: service is running the expected task definition."

      - name: Smoke check deployed health endpoint and CORS
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://i2g.ucmerced.edu' }}
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${FRONTEND_URL:-}" ]; then
            echo "FRONTEND_URL is required for smoke checks."
            exit 1
          fi

          if [ -z "${API_BASE_URL:-}" ]; then
            echo "VITE_API_BASE_URL is required for smoke checks."
            exit 1
          fi

          health_url="${API_BASE_URL%/}/readyz/"
          headers_file="$(mktemp)"
          headers_clean="$(mktemp)"
          body_file="$(mktemp)"

          status_code="$(curl -sS -D "$headers_file" -o "$body_file" \
            -H "Origin: $FRONTEND_URL" \
            "$health_url" \
            -w "%{http_code}")"

          tr -d '\r' < "$headers_file" > "$headers_clean"

          if [ "$status_code" != "200" ]; then
            echo "Readiness check failed with status $status_code"
            echo "Response headers:"
            cat "$headers_clean"
            echo "Response body:"
            cat "$body_file"
            exit 1
          fi

          cors_origin="$(awk -F': ' 'tolower($1) == "access-control-allow-origin" {print $2; exit}' "$headers_clean")"
          if [ "$cors_origin" != "$FRONTEND_URL" ]; then
            echo "Expected Access-Control-Allow-Origin: $FRONTEND_URL"
            echo "Actual Access-Control-Allow-Origin: ${cors_origin:-<missing>}"
            echo "Response headers:"
            cat "$headers_clean"
            exit 1
          fi

          python - <<'PY' "$body_file"
          import json
          import sys

          path = sys.argv[1]
          with open(path, "r", encoding="utf-8") as f:
              payload = json.load(f)

          if payload.get("status") not in ("ok", "maintenance"):
              raise SystemExit(f"Unexpected health payload: {payload}")
          PY

          echo "Readiness/CORS smoke check passed for $health_url"
