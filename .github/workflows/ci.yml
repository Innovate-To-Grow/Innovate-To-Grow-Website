name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'pages/**'
      - 'aws/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'
      - '.bandit-baseline.json'
  pull_request:
    paths:
      - 'src/**'
      - 'pages/**'
      - 'aws/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'
      - '.bandit-baseline.json'

permissions:
  contents: read

jobs:
  # ============================================
  # Stage 0: Secrets scan (fast, runs first)
  # ============================================
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Run the gitleaks CLI directly instead of the `gitleaks/gitleaks-action`
      # GitHub Action, which requires a paid license when the repository is
      # owned by an organization. The CLI itself is Apache-2.0 and works the
      # same, we just lose the Action's PR-comment integration.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          mkdir -p /tmp/gitleaks
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks
      # Scope the scan to commits introduced by this PR/push, not the whole
      # repo history. Historical leaks (pre-remediation commits from before
      # the codebase cleanup) were flagged and broke CI on otherwise-clean
      # branches; that's a separate "purge history" operation, not a gate
      # on new changes. This scan fails only when the current PR or push
      # introduces a *new* secret.
      - name: Run gitleaks on PR/push diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
        run: |
          if [ -n "$BASE_SHA" ] && [ -n "$PR_HEAD_SHA" ]; then
            RANGE="${BASE_SHA}..${PR_HEAD_SHA}"
          elif [ -n "$PUSH_BEFORE" ] && [ "$PUSH_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${PUSH_BEFORE}..${PUSH_HEAD}"
          else
            # New branch push or detached state — scan the latest commit only.
            # `HEAD~0..HEAD` is an empty range; `HEAD^..HEAD` scans the one
            # commit at HEAD, which is the correct fallback when we don't
            # have a base SHA to diff against.
            RANGE="HEAD^..HEAD"
          fi
          echo "Scanning commit range: $RANGE"
          /tmp/gitleaks/gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-banner \
            --log-opts "$RANGE" \
            --exit-code 1

  # ============================================
  # Stage 1: Code Style Check
  # ============================================
  lint:
    name: Code Style Check
    uses: ./.github/workflows/lint.yml

  # ============================================
  # Stage 2: Build & Test (depends on linting)
  # Order: DB migration → Docker build → Django test
  # ============================================

  # Backend Migration Validation (PostgreSQL) — runs first so a bad
  # schema change fails fast before we pay for a Docker build or the
  # full Django test matrix.
  backend-db-migration:
    name: Backend DB Migration Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: src
    env:
      DJANGO_SETTINGS_MODULE: core.settings.ci
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migration files are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations on PostgreSQL
        run: python manage.py migrate --noinput

      - name: Ensure no pending migrations remain
        run: python manage.py migrate --check

  # Backend Docker Build Validation — runs after migrations pass so we
  # don't waste a ~minute building an image on top of a broken schema.
  backend-docker-build:
    name: Backend Docker Build Test
    runs-on: ubuntu-latest
    needs: backend-db-migration
    # security-events: write is required by the SARIF-upload step.
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: src/Dockerfile
          failure-threshold: error

      - name: Build backend Docker image
        run: docker build -t itg-backend-ci:${{ github.sha }} src/

      # Trivy runs twice:
      # 1) SARIF scan over CRITICAL+HIGH → upload to Security tab so HIGHs
      #    are tracked/visible. exit-code 0 because we don't hard-fail on
      #    fixed-upstream CVEs that Debian hasn't yet shipped into the
      #    python:3.11-slim tag (openssl/libssl HIGHs, jaraco.context,
      #    wheel — all "fixed" status but not in current base image).
      # 2) CRITICAL-only gate with exit-code 1 — mirrors the npm audit
      #    pattern for xlsx. Raise the bar to HIGH once the base image
      #    includes the pending openssl/python-package fixes.
      - name: Scan image (trivy, SARIF — CRITICAL/HIGH → Security tab)
        id: trivy-sarif
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: itg-backend-ci:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-backend-image

      - name: Trivy human-readable table (CRITICAL/HIGH, log only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: itg-backend-ci:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Trivy hard-fail gate (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: itg-backend-ci:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # Django Backend Tests (per app) — runs last in the backend chain.
  django-build:
    name: Django Test (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: backend-docker-build
    strategy:
      fail-fast: false
      matrix:
        app: [authn, core, system_intelligence, cms, event, projects, mail]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: src
    env:
      DJANGO_SETTINGS_MODULE: core.settings.ci
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run Django tests
        run: python manage.py test ${{ matrix.app }}

      - name: Check Django configuration
        run: python manage.py check

  # ============================================
  # Security audits (run in parallel with lint + tests)
  # ============================================

  # Python dependency audit — hard-fail on any known vuln. Moved out of
  # django-build so a vulnerable dep doesn't mask (or get masked by) test
  # failures, and so a flaky audit doesn't gate Django tests.
  python-security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - name: Install pip-audit
        run: pip install "pip-audit==2.7.3"

      - name: Audit Python dependencies
        id: audit
        run: |
          set -o pipefail
          # pip-audit exits non-zero on ANY finding. We don't have a native
          # severity filter; add specific GHSA/CVE ids to --ignore-vuln here
          # with a written reason if a finding needs deferral.
          #
          # Deferral: litellm 1.83.13 currently pins python-dotenv==1.0.1
          # and aiohttp==3.13.3, so fixed floors cannot be applied without
          # making the resolver fail. Keep the ignores narrow and remove
          # them when litellm publishes metadata that allows fixed versions.
          pip-audit \
            --requirement requirements.txt \
            --progress-spinner off \
            --format columns \
            --ignore-vuln GHSA-mf9w-mj56-hr94 \
            --ignore-vuln GHSA-p998-jp59-783m \
            --ignore-vuln GHSA-hcc4-c3v8-rx92 \
            --ignore-vuln GHSA-m5qp-6w8w-w647 \
            --ignore-vuln GHSA-3wq7-rqq7-wx6j \
            --ignore-vuln GHSA-mwh4-6h8g-pg8w \
            --ignore-vuln GHSA-966j-vmvw-g2g9 \
            --ignore-vuln GHSA-63hf-3vf5-4wqf \
            --ignore-vuln GHSA-c427-h43c-vf67 \
            --ignore-vuln GHSA-w2fm-2cpv-w7v5 \
            --ignore-vuln GHSA-2vrm-gr82-f7m5 \
            | tee "$GITHUB_STEP_SUMMARY"

  # Frontend dependency audit — hard-fail only on CRITICAL per plan Q1.
  # HIGH stays warn-only until `xlsx` (no upstream fix) is swapped; that
  # swap is tracked as a separate follow-up.
  frontend-security-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (HIGH, warn-only)
        run: |
          set +e
          npm audit --audit-level=high
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::npm audit found HIGH-severity issues (see above). CRITICAL fails the next step."
          fi
          exit 0

      - name: npm audit (CRITICAL, hard-fail)
        run: npm audit --audit-level=critical

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    defaults:
      run:
        working-directory: pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # Frontend Build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
