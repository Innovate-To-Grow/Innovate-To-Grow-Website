name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "pages/**"
      - "aws/**"
      - "scripts/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".bandit-baseline.json"
      # Archived legacy static site. An archive-only merge to main must run CI
      # so the deploy-archive.yml chain (gated on CI completing on main) fires
      # and ships the archive to ECS. Every push to main runs the FULL suite
      # (see the `changes` job), so archive merges are validated end to end.
      - "archive/**"
  pull_request:
    paths:
      - "src/**"
      - "pages/**"
      - "aws/**"
      - "scripts/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".bandit-baseline.json"
      # Validate Claude Code project config in PRs so a .claude/-only PR still
      # produces the required `CI Result` check. Intentionally NOT in the push
      # paths above: a .claude/-only merge to main should not run CI and so
      # should not trigger the deploy-*.yml chain (which fires on CI completing
      # on main).
      - ".claude/**"
      # Archived legacy static site. An archive-only PR triggers the workflow,
      # but the `changes` job below routes it to just the `archive-tests` job
      # (the backend/frontend pipeline is skipped). Also in the push paths above
      # so an archive-only merge to main runs CI and triggers deploy-archive.yml.
      - "archive/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs only for pull requests; let every push to a default
  # branch finish so main/master is always fully validated.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DJANGO_SETTINGS_MODULE: config.settings.test
  BACKEND_COVERAGE_FAIL_UNDER: "40"
  COVERAGE_VERSION: "7.6.10"

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            src/requirements.txt
            .pre-commit-config.yaml

      - name: Install preflight tools
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "pre-commit==4.0.1" "PyYAML==6.0.2"
          ACTIONLINT_VERSION="1.7.7"
          ACTIONLINT_SHA256="023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
          curl -sSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum --check --strict -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint

      - name: Validate workflow syntax
        run: actionlint

      - name: Validate YAML, TOML, and JSON
        run: |
          pre-commit run check-yaml --all-files --show-diff-on-failure
          pre-commit run check-toml --all-files --show-diff-on-failure
          pre-commit run check-json --all-files --show-diff-on-failure

      - name: Validate tool version pins
        run: python scripts/ci/validate_tool_versions.py

      - name: Validate CI planner scripts
        run: python -m unittest discover -s scripts/ci/tests

      - name: Validate Dependabot labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/ci/validate_dependabot_labels.py

  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      archive: ${{ steps.filter.outputs.archive }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas from the diff
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          # PR: GitHub gives both endpoints (used to scope the PR's diff).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # A push to a default branch (main/master) always runs the FULL suite:
          # every area is validated on the branch that ships to production, and
          # any push therefore completes CI so the deploy-*.yml chain fires.
          if [ "${EVENT_NAME}" != "pull_request" ]; then
            echo "Push/non-PR event (${EVENT_NAME}); running the full suite."
            {
              echo "backend=true"
              echo "frontend=true"
              echo "archive=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull requests are scoped by diff to keep PR CI fast. Fall back to the
          # full deployable suite (skipping the archive) if no usable base exists.
          if [ -z "${BASE_SHA:-}" ] || [ -z "${HEAD_SHA:-}" ] \
            || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "No usable PR base SHA; running the full deployable suite."
            {
              echo "backend=true"
              echo "frontend=true"
              echo "archive=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"
          echo "Changed files:"
          echo "$files"
          match() { echo "$files" | grep -qE "$1"; }
          # Conservative: err toward running. A .github/** change maps to both
          # backend and frontend so any workflow edit runs the full suite.
          backend=false
          frontend=false
          archive=false
          if match '^(src/|aws/|scripts/|pyproject\.toml|\.pre-commit-config\.yaml|\.bandit-baseline\.json|\.github/)'; then backend=true; fi
          if match '^(pages/|\.github/)'; then frontend=true; fi
          if match '^archive/'; then archive=true; fi
          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "archive=$archive"
          } >> "$GITHUB_OUTPUT"

  lint:
    name: Python Code Style Check
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/lint.yml
    with:
      run-python: true

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: preflight
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --strict -
          mkdir -p /tmp/gitleaks
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks

      - name: Run gitleaks on PR/push diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ] && [ -n "${PR_HEAD_SHA:-}" ]; then
            RANGE="${BASE_SHA}..${PR_HEAD_SHA}"
          elif [ -n "${PUSH_BEFORE:-}" ] && [ "$PUSH_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${PUSH_BEFORE}..${PUSH_HEAD}"
          else
            RANGE="HEAD^..HEAD"
          fi

          echo "Scanning commit range: $RANGE"
          /tmp/gitleaks/gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-banner \
            --log-opts "$RANGE" \
            --exit-code 1

  backend-db-migration:
    name: Backend DB Migration Test (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: src
    env:
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache backend virtualenv
        id: backend-venv-cache
        uses: actions/cache@v5
        with:
          path: src/.venv
          key: backend-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-coverage${{ env.COVERAGE_VERSION }}-${{ hashFiles('src/requirements*.txt', 'src/requirements/**/*.txt') }}

      - name: Install dependencies
        if: ${{ steps.backend-venv-cache.outputs.cache-hit != 'true' }}
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt "coverage[toml]==${COVERAGE_VERSION}"

      - name: Check migration files are up to date
        run: .venv/bin/python manage.py makemigrations --check --dry-run

      - name: Apply migrations on PostgreSQL
        run: .venv/bin/python manage.py migrate --noinput

      - name: Ensure no pending migrations remain
        run: .venv/bin/python manage.py migrate --check

  backend-static-and-prod-check:
    name: Backend Static and Production Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: src
    env:
      DJANGO_SECRET_KEY: ci-production-smoke-secret-key-with-enough-entropy-2026
      DJANGO_ALLOWED_HOSTS: api.example.com
      BACKEND_URL: https://api.example.com
      FRONTEND_URL: https://i2g.example.com
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: db.example.com
      DB_PORT: 5432
      AWS_STORAGE_BUCKET_NAME: itg-ci-static
      CSRF_TRUSTED_ORIGINS: https://i2g.example.com
      CORS_ALLOWED_ORIGINS: https://i2g.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache backend virtualenv
        id: backend-venv-cache
        uses: actions/cache@v5
        with:
          path: src/.venv
          key: backend-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-coverage${{ env.COVERAGE_VERSION }}-${{ hashFiles('src/requirements*.txt', 'src/requirements/**/*.txt') }}

      - name: Install dependencies
        if: ${{ steps.backend-venv-cache.outputs.cache-hit != 'true' }}
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt "coverage[toml]==${COVERAGE_VERSION}"

      - name: Import production settings
        run: DJANGO_SETTINGS_MODULE=config.settings.production .venv/bin/python -c "import django; django.setup()"

      - name: Run Django deploy checks
        run: DJANGO_SETTINGS_MODULE=config.settings.production .venv/bin/python manage.py check --deploy

      - name: Dry-run collectstatic with CI settings
        run: .venv/bin/python manage.py collectstatic --dry-run --noinput --settings=config.settings.test

  django-test-plan:
    name: Plan Django Test Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    outputs:
      apps: ${{ steps.plan.outputs.apps }}
      cli_admin_coverage: ${{ steps.plan.outputs.cli_admin_coverage }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Capture changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" != "pull_request" ]; then
            : > changed-files.txt
            exit 0
          fi
          if [ -z "${BASE_SHA:-}" ] || [ -z "${HEAD_SHA:-}" ] \
            || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            : > changed-files.txt
            exit 0
          fi
          git diff --name-only "$BASE_SHA...$HEAD_SHA" > changed-files.txt
          echo "Changed backend files considered for Django tests:"
          cat changed-files.txt

      - name: Select changed Django apps
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/ci/plan_django_tests.py \
            --event-name "$EVENT_NAME" \
            --changed-files changed-files.txt \
            >> "$GITHUB_OUTPUT"

  django-test-coverage:
    name: Django Test and Coverage (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - backend-db-migration
      - backend-static-and-prod-check
      - django-test-plan
      - changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.django-test-plan.outputs.apps) }}
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: src
    env:
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache backend virtualenv
        id: backend-venv-cache
        uses: actions/cache@v5
        with:
          path: src/.venv
          key: backend-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-coverage${{ env.COVERAGE_VERSION }}-${{ hashFiles('src/requirements*.txt', 'src/requirements/**/*.txt') }}

      - name: Install dependencies
        if: ${{ steps.backend-venv-cache.outputs.cache-hit != 'true' }}
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt "coverage[toml]==${COVERAGE_VERSION}"

      - name: Run Django tests and enforce per-app coverage
        run: |
          .venv/bin/coverage run \
            --source="apps.${{ matrix.app }}" \
            --omit="*/migrations/*,*/tests/*" \
            manage.py test "apps.${{ matrix.app }}"
          .venv/bin/coverage xml -o "coverage-${{ matrix.app }}.xml"
          .venv/bin/coverage json --pretty-print -o "coverage-${{ matrix.app }}.json"
          .venv/bin/python - <<'PY'
          import json
          import os

          app = os.environ["APP_UNDER_TEST"]
          summary_path = f"coverage-{app}.json"
          with open(summary_path, encoding="utf-8") as fh:
              totals = json.load(fh)["totals"]

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(f"## Django coverage: {app}\n\n")
                  fh.write("| Metric | Covered | Total | Percent |\n")
                  fh.write("|---|---:|---:|---:|\n")
                  fh.write(
                      f"| Lines | {totals['covered_lines']} | {totals['num_statements']} | "
                      f"{totals['percent_covered_display']}% |\n"
                  )
          PY
          .venv/bin/coverage report -m --fail-under="${BACKEND_COVERAGE_FAIL_UNDER}"
        env:
          APP_UNDER_TEST: ${{ matrix.app }}

      - name: Check Django configuration
        run: .venv/bin/python manage.py check

      - name: Upload backend coverage XML
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-${{ matrix.app }}
          path: |
            src/coverage-${{ matrix.app }}.xml
            src/coverage-${{ matrix.app }}.json
          if-no-files-found: warn

  cli-admin-coverage:
    name: CLI Admin Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - backend-db-migration
      - backend-static-and-prod-check
      - django-test-plan
      - changes
    if: ${{ needs.changes.outputs.backend == 'true' && needs.django-test-plan.outputs.cli_admin_coverage == 'true' }}
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: src
    env:
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache backend virtualenv
        id: backend-venv-cache
        uses: actions/cache@v5
        with:
          path: src/.venv
          key: backend-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-coverage${{ env.COVERAGE_VERSION }}-${{ hashFiles('src/requirements*.txt', 'src/requirements/**/*.txt') }}

      - name: Install dependencies
        if: ${{ steps.backend-venv-cache.outputs.cache-hit != 'true' }}
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt "coverage[toml]==${COVERAGE_VERSION}"

      - name: Enforce coverage for cli_admin and safe_orm
        run: |
          .venv/bin/coverage run \
            --source="apps.cli_admin,apps.core.services.db_tools.safe_orm" \
            --omit="*/migrations/*,*/tests/*" \
            manage.py test apps.cli_admin apps.core.tests.services.test_safe_orm
          .venv/bin/coverage xml -o coverage-cli-admin-safe-orm.xml
          .venv/bin/coverage json --pretty-print -o coverage-cli-admin-safe-orm.json
          .venv/bin/python - <<'PY'
          import json
          import os

          with open("coverage-cli-admin-safe-orm.json", encoding="utf-8") as fh:
              totals = json.load(fh)["totals"]

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write("## CLI admin coverage\n\n")
                  fh.write("| Metric | Covered | Total | Percent |\n")
                  fh.write("|---|---:|---:|---:|\n")
                  fh.write(
                      f"| Lines | {totals['covered_lines']} | {totals['num_statements']} | "
                      f"{totals['percent_covered_display']}% |\n"
                  )
          PY
          .venv/bin/coverage report -m --fail-under=100

      - name: Upload CLI admin coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cli-admin-safe-orm-coverage
          path: |
            src/coverage-cli-admin-safe-orm.xml
            src/coverage-cli-admin-safe-orm.json
          if-no-files-found: warn

  frontend-lint:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  frontend-typecheck:
    name: Frontend TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: |
          npx tsc --noEmit --project tsconfig.app.json
          npx tsc --noEmit --project tsconfig.node.json

  frontend-unit-coverage:
    name: Frontend Unit Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Summarize frontend coverage
        if: ${{ always() }}
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::warning::Frontend coverage summary was not generated."
            exit 0
          fi
          node - <<'NODE'
          const fs = require('node:fs');

          const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
          const rows = [
            ['Statements', summary.statements],
            ['Branches', summary.branches],
            ['Functions', summary.functions],
            ['Lines', summary.lines],
          ];

          const target = process.env.GITHUB_STEP_SUMMARY;
          if (target) {
            const body = [
              '## Frontend coverage',
              '',
              '| Metric | Covered | Total | Percent |',
              '|---|---:|---:|---:|',
              ...rows.map(([name, metric]) => `| ${name} | ${metric.covered} | ${metric.total} | ${metric.pct}% |`),
              '',
              'Vitest enforces the thresholds defined in `pages/vitest.config.ts`.',
              '',
            ].join('\n');
            fs.appendFileSync(target, body);
          }
          NODE

      - name: Upload frontend coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: |
            pages/coverage/lcov.info
            pages/coverage/coverage-summary.json
          if-no-files-found: warn

  frontend-build:
    name: Frontend CI Build Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for CI and E2E
        run: npm run build
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000

      - name: Upload frontend dist for CI
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-ci
          path: pages/dist
          if-no-files-found: warn

  frontend-bundle-size:
    name: Frontend Bundle Size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - frontend-build
      - changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download CI frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-ci
          path: pages/dist

      - name: Enforce bundle budgets
        run: npm run size

  frontend-security-audit:
    name: Frontend npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (moderate and above)
        run: npm audit --audit-level=moderate

  frontend-supply-chain-report:
    name: Frontend SBOM and License Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate npm SBOM
        run: npm sbom --sbom-format cyclonedx --json > ../npm-sbom.cdx.json

      - name: Check npm licenses
        run: python3 ../scripts/ci/check_npm_licenses.py --package-lock package-lock.json --output ../npm-license-report.json

      - name: Upload frontend supply chain artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-supply-chain-reports
          path: |
            npm-sbom.cdx.json
            npm-license-report.json
          if-no-files-found: warn

  frontend-required:
    name: Frontend Required Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - frontend-lint
      - frontend-typecheck
      - frontend-unit-coverage
      - frontend-build
      - frontend-bundle-size
      - frontend-security-audit
      - frontend-supply-chain-report
      - changes
    if: ${{ always() && needs.changes.outputs.frontend == 'true' }}
    steps:
      - name: Summarize frontend required checks
        env:
          NEEDS_CONTEXT: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if name != "changes" and data["result"] != "success"
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("All frontend required checks passed.")
          PY

  frontend-prod-build:
    name: Frontend Production Build Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - frontend-required
      - changes
    if: >-
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'master') &&
      needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate production frontend configuration
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::VITE_API_BASE_URL is required for the production frontend build."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}

      - name: Upload production frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-prod
          path: pages/dist
          if-no-files-found: error

  python-security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install pip-audit
        run: pip install "pip-audit[cyclonedx]==2.7.3"

      - name: Audit Python dependencies
        run: |
          set -o pipefail
          pip-audit \
            --requirement requirements.txt \
            --progress-spinner off \
            --format columns \
            --ignore-vuln GHSA-mf9w-mj56-hr94 \
            --ignore-vuln GHSA-p998-jp59-783m \
            --ignore-vuln GHSA-hcc4-c3v8-rx92 \
            --ignore-vuln GHSA-m5qp-6w8w-w647 \
            --ignore-vuln GHSA-3wq7-rqq7-wx6j \
            --ignore-vuln GHSA-mwh4-6h8g-pg8w \
            --ignore-vuln GHSA-966j-vmvw-g2g9 \
            --ignore-vuln GHSA-63hf-3vf5-4wqf \
            --ignore-vuln GHSA-c427-h43c-vf67 \
            --ignore-vuln GHSA-w2fm-2cpv-w7v5 \
            --ignore-vuln GHSA-2vrm-gr82-f7m5 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2026-161 \
            | tee "$GITHUB_STEP_SUMMARY"

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, changes]
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Semgrep
        run: pip install "semgrep==1.107.0"

      - name: Run Semgrep
        id: semgrep
        env:
          RUN_BACKEND: ${{ needs.changes.outputs.backend }}
          RUN_FRONTEND: ${{ needs.changes.outputs.frontend }}
        run: |
          set -euo pipefail
          targets=()
          if [ "$RUN_BACKEND" = "true" ]; then
            targets+=(src)
          fi
          if [ "$RUN_FRONTEND" = "true" ]; then
            targets+=(pages)
          fi
          semgrep scan --config p/default --config p/python --config p/javascript \
            --metrics=off --sarif --output semgrep.sarif "${targets[@]}" || true

      - name: Upload Semgrep SARIF artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn

  backend-docker-build:
    name: Backend Docker Build and Scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - lint
      - changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: src/Dockerfile
          failure-threshold: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build backend Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: src
          load: true
          tags: itg-backend-ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Persist Trivy's vulnerability DB across runs so the scan below doesn't
      # re-pull it from the registry on every CI run. Both Trivy steps point at
      # this dir via TRIVY_CACHE_DIR.
      - name: Cache Trivy vulnerability database
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-

      - name: Scan image (Trivy CRITICAL/HIGH)
        id: trivy-sarif
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
        with:
          image-ref: itg-backend-ci:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: warn

      - name: Upload Trivy SARIF to GitHub Security tab
        if: ${{ github.event_name == 'push' && !cancelled() }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-backend-image

      # Only re-render the human-readable table when something failed. On the
      # happy path the SARIF artifact above already captures every finding, so
      # skipping this avoids a second full image scan. The cached DB above keeps
      # this fast when it does run.
      - name: Trivy human-readable table
        if: ${{ failure() }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
        with:
          image-ref: itg-backend-ci:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

  backend-required-result:
    name: Backend Required Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - lint
      - backend-db-migration
      - backend-static-and-prod-check
      - django-test-plan
