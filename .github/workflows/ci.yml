    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - backend-image-publish
      - frontend-prod-build
      - changes
    if: ${{ always() }}
    steps:
      - name: Summarize deploy artifact checks
        env:
          NEEDS_CONTEXT: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
