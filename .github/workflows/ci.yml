        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          ok = {"success", "skipped"}
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if name != "changes" and data["result"] not in ok
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("All backend required checks passed.")
          PY

  backend-image-publish:
    name: Backend Image Publish
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - backend-required-result
      - changes
    if: >-
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'master') &&
      needs.changes.outputs.backend == 'true'
    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY: itg-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and publish backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: src
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-required-result:
    name: Security Required Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - secrets-scan
