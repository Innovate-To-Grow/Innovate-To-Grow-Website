name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'pages/**'
      - 'aws/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'pages/**'
      - 'aws/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  # ============================================
  # Stage 0: Secrets scan (fast, runs first)
  # ============================================
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Run the gitleaks CLI directly instead of the `gitleaks/gitleaks-action`
      # GitHub Action, which requires a paid license when the repository is
      # owned by an organization. The CLI itself is Apache-2.0 and works the
      # same, we just lose the Action's PR-comment integration.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          mkdir -p /tmp/gitleaks
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks
      # Scope the scan to commits introduced by this PR/push, not the whole
      # repo history. Historical leaks (pre-remediation commits from before
      # the codebase cleanup) were flagged and broke CI on otherwise-clean
      # branches; that's a separate "purge history" operation, not a gate
      # on new changes. This scan fails only when the current PR or push
      # introduces a *new* secret.
      - name: Run gitleaks on PR/push diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
        run: |
          if [ -n "$BASE_SHA" ] && [ -n "$PR_HEAD_SHA" ]; then
            RANGE="${BASE_SHA}..${PR_HEAD_SHA}"
          elif [ -n "$PUSH_BEFORE" ] && [ "$PUSH_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${PUSH_BEFORE}..${PUSH_HEAD}"
          else
            # New branch push or detached state — scan the latest commit only.
            RANGE="HEAD~0..HEAD"
          fi
          echo "Scanning commit range: $RANGE"
          /tmp/gitleaks/gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-banner \
            --log-opts "$RANGE" \
            --exit-code 1

  # ============================================
  # Stage 1: Code Style Check
  # ============================================
  lint:
    name: Code Style Check
    uses: ./.github/workflows/lint.yml

  # ============================================
  # Stage 2: Build & Test (depends on linting)
  # ============================================

  # Django Backend Build & Test
  django-build:
    name: Django Build & Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: src
    env:
      DJANGO_SETTINGS_MODULE: core.settings.ci
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run Django tests
        run: python manage.py test

      - name: Check Django configuration
        run: python manage.py check

      - name: Audit Python dependencies (non-blocking warning)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln GHSA-None-Placeholder || echo "::warning::pip-audit found vulnerabilities (see output above)"

  # Backend Docker Build Validation
  backend-docker-build:
    name: Backend Docker Build Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: src/Dockerfile
          failure-threshold: error

      - name: Build backend Docker image
        run: docker build -t itg-backend-ci:${{ github.sha }} src/

      - name: Scan image for OS/library CVEs (trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: itg-backend-ci:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'  # warn-only until baseline is clean
          ignore-unfixed: true

      - name: Export backend Docker image
        run: docker save itg-backend-ci:${{ github.sha }} -o /tmp/itg-backend-ci.tar

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v5
        with:
          name: itg-backend-ci-image-${{ github.sha }}
          path: /tmp/itg-backend-ci.tar
          retention-days: 1

  # Backend Migration Validation (PostgreSQL)
  backend-db-migration:
    name: Backend DB Migration Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [lint, backend-docker-build]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Download backend image artifact
        uses: actions/download-artifact@v5
        with:
          name: itg-backend-ci-image-${{ github.sha }}
          path: /tmp

      - name: Load backend Docker image
        run: docker load -i /tmp/itg-backend-ci.tar

      - name: Check migration files are up to date
        run: |
          docker run --rm \
            --network host \
            --entrypoint python \
            -e DJANGO_SETTINGS_MODULE=core.settings.ci \
            -e DB_NAME=itg_ci \
            -e DB_USER=itg_ci_user \
            -e DB_PASSWORD=itg_ci_pass \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            itg-backend-ci:${{ github.sha }} \
            manage.py makemigrations --check --dry-run

      - name: Apply migrations on PostgreSQL
        run: |
          docker run --rm \
            --network host \
            --entrypoint python \
            -e DJANGO_SETTINGS_MODULE=core.settings.ci \
            -e DB_NAME=itg_ci \
            -e DB_USER=itg_ci_user \
            -e DB_PASSWORD=itg_ci_pass \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            itg-backend-ci:${{ github.sha }} \
            manage.py migrate --noinput

      - name: Ensure no pending migrations remain
        run: |
          docker run --rm \
            --network host \
            --entrypoint python \
            -e DJANGO_SETTINGS_MODULE=core.settings.ci \
            -e DB_NAME=itg_ci \
            -e DB_USER=itg_ci_user \
            -e DB_PASSWORD=itg_ci_pass \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            itg-backend-ci:${{ github.sha }} \
            manage.py migrate --check

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    defaults:
      run:
        working-directory: pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # Frontend Build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies (warn-only)
        run: npm audit --audit-level=high || echo "::warning::npm audit found high-severity issues"

      - name: Build frontend
        run: npm run build
