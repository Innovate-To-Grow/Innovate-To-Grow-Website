          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          ok = {"success", "skipped"}
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if name != "changes" and data["result"] not in ok
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("Deploy artifacts passed or were not required for this run.")
          PY

  python-supply-chain-report:
    name: Python Supply Chain Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - python-security-audit
      - changes
    if: ${{ always() && needs.changes.outputs.backend == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install Python SBOM tools
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit[cyclonedx]==2.7.3"

      - name: Generate Python SBOM
        run: |
          pip-audit \
            --requirement src/requirements.txt \
            --progress-spinner off \
            --format cyclonedx-json \
            --output python-sbom.cdx.json \
            || true
          test -s python-sbom.cdx.json

      - name: Upload Python supply chain artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: python-supply-chain-report
          path: python-sbom.cdx.json
          if-no-files-found: warn

  supply-chain-result:
    name: Supply Chain Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - python-supply-chain-report
      - frontend-supply-chain-report
      - changes
    if: ${{ always() }}
    steps:
      - name: Summarize supply chain checks
        env:
          NEEDS_CONTEXT: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          ok = {"success", "skipped"}
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if name != "changes" and data["result"] not in ok
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("All supply chain checks passed.")
          PY

  e2e-plan:
    name: Plan E2E Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    outputs:
      projects: ${{ steps.plan.outputs.projects }}
      spec_args: ${{ steps.plan.outputs.spec_args }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Capture changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" != "pull_request" ]; then
            : > changed-files.txt
            exit 0
          fi
          if [ -z "${BASE_SHA:-}" ] || [ -z "${HEAD_SHA:-}" ] \
            || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            : > changed-files.txt
            exit 0
          fi
          git diff --name-only "$BASE_SHA...$HEAD_SHA" > changed-files.txt
          echo "Changed frontend files considered for E2E:"
          cat changed-files.txt

      - name: Select browser/device/spec coverage
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/ci/plan_e2e_tests.py \
            --event-name "$EVENT_NAME" \
            --changed-files changed-files.txt \
            >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.e2e-plan.outputs.matrix) }}
    needs:
      # backend-docker-build intentionally omitted: e2e runs the app via
      # `manage.py runserver`, never the built image, so depending on it only
      # serialized e2e behind the slowest job without adding coverage.
      - e2e-plan
      - frontend-required
      - secrets-scan
      - changes
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_DB: itg_ci
          POSTGRES_USER: itg_ci_user
          POSTGRES_PASSWORD: itg_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itg_ci_user -d itg_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_NAME: itg_ci
      DB_USER: itg_ci_user
      DB_PASSWORD: itg_ci_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      VITE_API_BASE_URL: http://127.0.0.1:8000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
      PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8000
      PW_PROJECT: ${{ matrix.project }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache backend virtualenv
        id: backend-venv-cache
        uses: actions/cache@v5
        with:
          path: src/.venv
          key: backend-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-coverage${{ env.COVERAGE_VERSION }}-${{ hashFiles('src/requirements*.txt', 'src/requirements/**/*.txt') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install backend dependencies
        if: ${{ steps.backend-venv-cache.outputs.cache-hit != 'true' }}
        working-directory: src
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt "coverage[toml]==${COVERAGE_VERSION}"

      - name: Install frontend dependencies
        working-directory: pages
        run: npm ci

      - name: Download CI frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-ci
          path: pages/dist

      # Key the browser cache on the resolved Playwright version so a version
      # bump invalidates it automatically.
      - name: Resolve Playwright version
        id: playwright-version
        working-directory: pages
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          # The -cfw suffix (chromium+firefox+webkit) busts any older cache that
          # only held chromium, which would otherwise hit and skip installing
          # firefox/webkit, breaking those legs.
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-cfw

      # On a cache hit the browser binaries are restored, but the OS-level
      # dependencies (apt packages) are not — install just those. On a miss,
      # do the full download + deps install.
      - name: Install Playwright browsers (cache miss)
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        working-directory: pages
        run: npm run e2e:install

      - name: Install Playwright system dependencies (cache hit)
        if: ${{ steps.playwright-cache.outputs.cache-hit == 'true' }}
        working-directory: pages
        run: npx playwright install-deps chromium firefox webkit

      - name: Prepare backend database
        working-directory: src
        run: .venv/bin/python manage.py migrate --noinput

      - name: Seed admin E2E data
        working-directory: src
        run: .venv/bin/python manage.py seed_admin_e2e --yes

      - name: Start backend
        working-directory: src
        run: |
          .venv/bin/python manage.py runserver 127.0.0.1:8000 > ../backend-e2e.log 2>&1 &
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/readyz/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../backend-e2e.log
          exit 1

      - name: Start frontend preview
        working-directory: pages
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > ../frontend-e2e.log 2>&1 &
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../frontend-e2e.log
          exit 1

      - name: Run Playwright tests
        working-directory: pages
        env:
          PLAYWRIGHT_SPEC_ARGS: ${{ matrix.spec_args }}
        run: |
          args=()
          if [ -n "$PLAYWRIGHT_SPEC_ARGS" ]; then
            read -r -a args <<< "$PLAYWRIGHT_SPEC_ARGS"
          fi
          npx playwright test "${args[@]}" --project="$PW_PROJECT"

      - name: Upload blob report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-${{ matrix.project }}
          path: pages/blob-report/
          if-no-files-found: warn

      - name: Upload server logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs-${{ matrix.project }}
          path: |
            backend-e2e.log
            frontend-e2e.log
          if-no-files-found: warn

  e2e-report:
    name: E2E Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [e2e, changes]
    if: ${{ always() && needs.changes.outputs.frontend == 'true' }}
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: pages/package-lock.json

      - name: Install frontend dependencies
        working-directory: pages
        run: npm ci

      - name: Download blob reports
        id: download-blobs
        # This report job is informational; a flaky/conflicting artifact
        # download must not turn the run red. The merge step below tolerates a
        # missing/empty directory.
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: pages/all-blob-reports
          pattern: blob-*
          merge-multiple: true

      - name: Merge blob reports into HTML + JUnit + GitHub annotations
        working-directory: pages
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: results.xml
        run: |
          set -euo pipefail
          if [ ! -d ./all-blob-reports ] || [ -z "$(ls -A ./all-blob-reports 2>/dev/null)" ]; then
            echo "::notice::No blob reports to merge; skipping report generation."
            exit 0
          fi
          npx playwright merge-reports --reporter html,github,junit ./all-blob-reports

      - name: Write per-project job summary
        if: ${{ always() }}
        working-directory: pages
        run: |
          python3 - <<'PY'
          import glob, os, xml.etree.ElementTree as ET
          total = fail = err = skip = 0
          dur = 0.0
          for f in sorted(glob.glob('results*.xml')):
              try:
                  root = ET.parse(f).getroot()
              except Exception:
                  continue
              suites = [root] if root.tag == 'testsuite' else root.iter('testsuite')
              for s in suites:
                  total += int(s.get('tests', 0))
                  fail += int(s.get('failures', 0))
                  err += int(s.get('errors', 0))
                  skip += int(s.get('skipped', 0))
                  dur += float(s.get('time', 0) or 0)
          passed = total - fail - err - skip
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a') as fh:
                  fh.write('## Playwright E2E\n\n')
                  fh.write('| Total | Passed | Failed | Skipped | Duration |\n')
                  fh.write('|---|---|---|---|---|\n')
                  fh.write(f'| {total} | {passed} | {fail + err} | {skip} | {dur:.1f}s |\n')
          PY

      - name: Annotate test results on the PR
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: pages/results.xml
          detailed_summary: true
          include_passed: false
          fail_on_failure: false

      - name: Upload merged HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-html-report
          path: |
            pages/playwright-report
            pages/test-results
          if-no-files-found: warn

  e2e-informational-result:
    name: E2E Informational Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - e2e-report
      - changes
    if: ${{ always() && needs.changes.outputs.frontend == 'true' }}
    continue-on-error: true
    steps:
      - name: Summarize E2E informational checks
        env:
          NEEDS_CONTEXT: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          for name, data in needs.items():
              if name != "changes":
                  print(f"{name}: {data['result']}")
          print("E2E remains informational and does not block CI Result.")
          PY

  archive-tests:
    name: Archive Static Site Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: ${{ needs.changes.outputs.archive == 'true' }}
    defaults:
      run:
        working-directory: archive/page
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the static-site smoke suite
        run: pytest

  archive-required-result:
    name: Archive Required Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - archive-tests
      - changes
    if: ${{ always() }}
    steps:
      - name: Summarize archive checks
        env:
          NEEDS_CONTEXT: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          ok = {"success", "skipped"}
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if name != "changes" and data["result"] not in ok
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("Archive checks passed or were not required for this run.")
          PY

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - preflight
      - changes
      - backend-required-result
      - frontend-required
      - security-required-result
      - supply-chain-result
      - deploy-artifact-result
      - archive-required-result
    if: ${{ always() }}
    steps:
      - name: Summarize required jobs
        env:
          NEEDS_CONTEXT: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_CONTEXT"])
          # Path-filtered jobs that don't apply to this change report "skipped";
          # that is a pass, not a failure. Only real failures/cancellations block.
          ok = {"success", "skipped"}
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ok
          }
          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)
          print("All required CI jobs passed.")
          PY

  ci-timing-report:
    name: CI Timing Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci-result]
    if: ${{ always() }}
    continue-on-error: true
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fetch current workflow jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" > workflow-jobs.json

      - name: Write CI timing summary
        run: python scripts/ci/summarize_workflow_jobs.py < workflow-jobs.json >> "$GITHUB_STEP_SUMMARY"
