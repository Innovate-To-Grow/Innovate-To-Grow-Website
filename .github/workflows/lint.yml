name: Code Style Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # Python (Django Backend) Linting
  python-lint:
    name: Python Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.0 "bandit[toml]==1.7.10"

      - name: Run Ruff linter
        run: ruff check .

      - name: Run Ruff formatter check
        run: ruff format --check .

      # Bandit SAST — config lives in pyproject.toml [tool.bandit]. The
      # baseline pins pre-existing findings so only *new* issues break CI.
      # Update the baseline with `bandit -r src -c pyproject.toml -f json
      # -o .bandit-baseline.json` after resolving findings intentionally.
      - name: Run Bandit (with baseline)
        run: bandit -r . -c ../pyproject.toml --baseline ../.bandit-baseline.json

  # TypeScript/React (Frontend) Linting
  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit
