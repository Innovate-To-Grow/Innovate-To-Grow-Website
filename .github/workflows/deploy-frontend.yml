name: Deploy Frontend to AWS Amplify

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Frontend
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: AWS Amplify - Prod
      url: https://i2g.ucmerced.edu
    defaults:
      run:
        working-directory: pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate required deploy configuration
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::VITE_API_BASE_URL is required for the Amplify build."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Configure Amplify rewrite rules (sitemap, API, SPA)
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID || secrets.AMPLIFY_APP_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          app_id = os.environ["AMPLIFY_APP_ID"].strip()
          api_base_url = os.environ["VITE_API_BASE_URL"].strip().rstrip("/")
          if not app_id:
              raise SystemExit("AMPLIFY_APP_ID is required to configure rewrite rules.")
          if not api_base_url:
              raise SystemExit("VITE_API_BASE_URL is required to configure rewrite rules.")

          app_payload = subprocess.check_output(
              ["aws", "amplify", "get-app", "--app-id", app_id, "--output", "json"],
              text=True,
          )
          app = json.loads(app_payload)["app"]
          existing_rules = app.get("customRules") or []

          sitemap_rule = {
              "source": "/sitemap.xml",
              "target": f"{api_base_url}/sitemap.xml",
              "status": "200",
          }

          # SPA deep-link fallback. The previous "/<*>" rule with status "404-200"
          # did NOT rewrite on the custom domain — hard navigations to client routes
          # (e.g. /past-projects/<id>) fell through to the S3 website endpoint and
          # returned its index.html error document with a 404 status. This is the
          # canonical Amplify SPA rule: any path WITHOUT a static-asset extension is
          # rewritten (status 200) to /index.html so React Router can resolve it.
          # It is placed LAST so the sitemap and /api/<*> passthrough rules win first
          # (extensionless /api/... paths would otherwise match this rule).
          spa_rule = {
              "source": (
                  r"</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|webp|avif|"
                  r"woff|woff2|ttf|otf|eot|map|json|xml|webmanifest)$)([^.]+$)/>"
              ),
              "target": "/index.html",
              "status": "200",
          }

          # Preserve any other existing rules (notably the /api/<*> backend
          # passthrough) but drop the stale sitemap rule and ANY old SPA fallback
          # (identified by target /index.html, e.g. the broken "/<*>" 404-200 rule),
          # so re-running this step is idempotent.
          preserved = [
              rule
              for rule in existing_rules
              if rule.get("source") != sitemap_rule["source"]
              and rule.get("target") != "/index.html"
          ]

          merged_rules = [sitemap_rule] + preserved + [spa_rule]

          with open("custom-rules.json", "w", encoding="utf-8") as f:
              json.dump(merged_rules, f)

          subprocess.check_call(
              [
                  "aws",
                  "amplify",
                  "update-app",
                  "--app-id",
                  app_id,
                  "--custom-rules",
                  "file://custom-rules.json",
              ]
          )
          PY

      - name: Deploy to AWS Amplify
        id: deploy-amplify
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID || secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: main
        run: |
          # Create a deployment and get the upload URL + job ID
          DEPLOY_RESULT=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH")

          JOB_ID=$(echo "$DEPLOY_RESULT" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$DEPLOY_RESULT" | jq -r '.zipUploadUrl')

          echo "Job ID: $JOB_ID"

          # Zip the build output
          cd dist
          zip -r ../build.zip .
          cd ..

          # Upload the zip to the pre-signed URL
          curl -T build.zip "$UPLOAD_URL" \
            -H "Content-Type: application/zip"

          # Start the deployment
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-id "$JOB_ID"

          echo "job-id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Deployment started successfully (Job ID: $JOB_ID). Check Amplify console for status."

      - name: Wait for Amplify deployment to finish
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID || secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: main
          JOB_ID: ${{ steps.deploy-amplify.outputs.job-id }}
        run: |
          set -euo pipefail

          while true; do
            status="$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text)"
            echo "Amplify job $JOB_ID status: $status"

            case "$status" in
              SUCCEED)
                exit 0
                ;;
              FAILED|CANCELLED)
                aws amplify get-job \
                  --app-id "$AMPLIFY_APP_ID" \
                  --branch-name "$AMPLIFY_BRANCH" \
                  --job-id "$JOB_ID" \
                  --output json
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

      - name: Smoke check deployed frontend
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://i2g.ucmerced.edu' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail

          frontend="${FRONTEND_URL%/}"
          api="${VITE_API_BASE_URL%/}"

          for url in "$frontend/" "$frontend/robots.txt" "$frontend/sitemap.xml" "$api/readyz/"; do
            echo "Checking $url"
            curl --fail --show-error --silent --location --max-time 30 "$url" >/tmp/smoke-body
            if [ ! -s /tmp/smoke-body ]; then
              echo "::error::Smoke target returned an empty body: $url"
              exit 1
            fi
          done
