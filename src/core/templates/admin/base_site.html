{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | I2G Admin{% endblock %}
{% block branding %}{{ site_header|default:_("Innovate To Grow") }}{% endblock %}

{% block extrahead %}
  {{ block.super }}
  <script>
    (function () {
      var STORAGE_KEY = 'i2g_admin_sidebar_scroll_top';
      var RESTORE_ATTEMPTS = 20;

      function getScrollEl() {
        return (
          document.querySelector('#nav-sidebar-apps .simplebar-content-wrapper') ||
          document.querySelector('#nav-sidebar .simplebar-content-wrapper') ||
          document.querySelector('#nav-sidebar-apps') ||
          document.querySelector('#nav-sidebar-inner')
        );
      }

      function saveScroll() {
        try {
          var el = getScrollEl();
          if (!el) return;
          sessionStorage.setItem(STORAGE_KEY, String(el.scrollTop || 0));
        } catch (e) {
          // ignore
        }
      }

      function restoreScroll() {
        try {
          var el = getScrollEl();
          if (!el) return;
          var raw = sessionStorage.getItem(STORAGE_KEY);
          if (raw == null) return;
          var val = parseInt(raw, 10);
          if (Number.isNaN(val)) return;
          el.scrollTop = val;
        } catch (e) {
          // ignore
        }
      }

      function restoreScrollWhenReady(attempt) {
        restoreScroll();
        if (attempt >= RESTORE_ATTEMPTS) return;

        var el = getScrollEl();
        var raw = sessionStorage.getItem(STORAGE_KEY);
        var val = raw == null ? null : parseInt(raw, 10);
        if (!el || val == null || Number.isNaN(val) || Math.abs((el.scrollTop || 0) - val) < 2) {
          return;
        }

        window.requestAnimationFrame(function () {
          restoreScrollWhenReady(attempt + 1);
        });
      }

      window.addEventListener('pagehide', saveScroll);
      window.addEventListener('beforeunload', saveScroll);
      document.addEventListener('click', function (e) {
        var target = e.target;
        if (!target || !target.closest) return;
        var link = target.closest('a');
        if (link && link.closest('#nav-sidebar')) saveScroll();
      });

      document.addEventListener('DOMContentLoaded', function () {
        // Allow SimpleBar to initialize, then keep retrying briefly.
        setTimeout(function () {
          restoreScrollWhenReady(0);
        }, 0);
      });
    })();
  </script>
{% endblock %}
