{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}{{ title }}{% endblock %}
{% block content_title %}<h1>{{ title }}</h1>{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <div style="max-width:480px">
        <div class="mb-6">
            <label for="id_recipient" class="block text-sm font-medium mb-1">{{ input_label }}</label>
            <input
                type="{{ input_type }}"
                name="recipient"
                id="id_recipient"
                placeholder="{{ input_placeholder }}"
                required
                class="w-full border border-base-300 rounded-md px-3 py-2 text-sm"
            >
            {% if input_help %}<p class="text-xs text-base-400 mt-1">{{ input_help }}</p>{% endif %}
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-primary-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-primary-700">
                {{ submit_label }}
            </button>
            <a href="{{ cancel_url }}" class="border border-base-300 px-4 py-2 rounded-md text-sm font-medium hover:bg-base-50">
                Cancel
            </a>
        </div>
    </div>
</form>
{% endblock %}
