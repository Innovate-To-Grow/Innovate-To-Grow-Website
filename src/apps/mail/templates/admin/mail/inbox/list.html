{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}{{ title }}{% endblock %}
{% block content_title %}{% endblock %}

{% block extrahead %}
    {{ block.super }}
    <style>
        @keyframes i2g-inbox-spin {
            to { transform: rotate(360deg); }
        }
        .i2g-inbox-refresh--loading .i2g-inbox-refresh-icon {
            animation: i2g-inbox-spin 0.75s linear infinite;
            display: inline-block;
        }
        .i2g-inbox-refresh--loading { opacity: 0.65; }

        #page {
            height: 100vh;
            overflow: hidden;
        }

        #main {
            min-height: 0;
            overflow: hidden;
        }

        #main > .border-b.mb-6 {
            margin-bottom: 0 !important;
        }

        #main > .grow {
            display: flex;
            flex: 1 1 0;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            padding: 0 !important;
        }

        #content {
            display: flex;
            flex: 1 1 0;
            flex-direction: column;
            margin: 0 !important;
            max-width: none !important;
            min-height: 0;
            padding: 0 !important;
            width: 100% !important;
        }

        #inbox-all-dynamic {
            display: flex;
            flex: 1 1 0;
            min-height: 0;
            width: 100%;
        }

        .i2g-mail-shell {
            background: var(--md-sys-color-surface-container-lowest, #fff);
            border: 0;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex: 1 1 0;
            flex-direction: column;
            height: auto;
            min-height: 0;
            width: 100%;
            overflow: hidden;
        }

        .i2g-mail-toolbar {
            align-items: center;
            background: var(--md-sys-color-surface-container-low, #f8fafc);
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #e5e7eb);
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            min-height: 64px;
            padding: 0.75rem 1rem;
        }

        .i2g-mail-toolbar__identity,
        .i2g-mail-toolbar__actions {
            align-items: center;
            display: flex;
            gap: 0.75rem;
            min-width: 0;
        }

        .i2g-mail-toolbar__icon {
            align-items: center;
            background: var(--md-sys-color-primary-container, #dbeafe);
            border-radius: 8px;
            color: var(--md-sys-color-primary, #1d4ed8) !important;
            display: flex !important;
            flex: 0 0 36px;
            font-size: 20px !important;
            height: 36px;
            justify-content: center;
            width: 36px;
        }

        .i2g-mail-toolbar__copy {
            min-width: 0;
        }

        .i2g-mail-toolbar__title {
            color: var(--md-sys-color-on-surface, #111827);
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.25rem;
        }

        .i2g-mail-toolbar__meta {
            color: var(--md-sys-color-on-surface-variant, #64748b);
            font-size: 0.75rem;
            line-height: 1.125rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .i2g-mail-toolbar__divider {
            background: var(--md-sys-color-outline-variant, #d9dee3);
            height: 1.5rem;
            width: 1px;
        }

        .i2g-inbox-refresh-btn,
        .i2g-inbox-account-toggle {
            align-items: center;
            border-radius: 999px;
            display: inline-flex;
            font-size: 0.8125rem;
            font-weight: 600;
            gap: 0.375rem;
            min-height: 2rem;
            padding: 0 0.75rem;
            transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        .i2g-inbox-refresh-btn {
            background: var(--md-sys-color-primary, #1d4ed8);
            border: 1px solid var(--md-sys-color-primary, #1d4ed8) !important;
            color: #fff !important;
        }

        .i2g-inbox-refresh-btn:hover {
            background: color-mix(in srgb, var(--md-sys-color-primary, #1d4ed8) 88%, #000);
        }

        .i2g-inbox-account-toggle {
            background: var(--md-sys-color-surface-container-lowest, #fff);
            border: 1px solid var(--md-sys-color-outline-variant, #d9dee3);
            color: var(--md-sys-color-on-surface, #111827);
        }

        .i2g-inbox-account-toggle:hover {
            background: var(--md-sys-color-surface-container, #eef2f7);
        }

        .i2g-inbox-limit-control {
            align-items: center;
            color: var(--md-sys-color-on-surface-variant, #64748b);
            display: inline-flex;
            font-size: 0.75rem;
            gap: 0.375rem;
            line-height: 1rem;
            white-space: nowrap;
        }

        .i2g-inbox-account-toggle__icon {
            font-size: 18px !important;
            transition: transform 0.15s ease;
        }

        .i2g-mail-shell.is-account-collapsed .i2g-inbox-account-toggle__icon {
            transform: rotate(-90deg);
        }

        .i2g-mail-account-panel {
            background: var(--md-sys-color-surface-container-lowest, #fff);
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #e5e7eb);
            display: grid;
            gap: 0.75rem;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            padding: 0.75rem 1rem;
        }

        .i2g-mail-shell.is-account-collapsed .i2g-mail-account-panel {
            display: none;
        }

        .i2g-mail-account-field {
            min-width: 0;
        }

        .i2g-mail-account-field__label {
            color: var(--md-sys-color-on-surface-variant, #64748b);
            display: block;
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0;
            line-height: 1rem;
            text-transform: uppercase;
        }

        .i2g-mail-account-field__value {
            color: var(--md-sys-color-on-surface, #111827);
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            line-height: 1.25rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .i2g-inbox-split {
            display: flex;
            flex: 1 1 auto;
            min-height: 0;
        }

        .i2g-inbox-list-panel {
            background: var(--md-sys-color-surface-container-lowest, #fff);
            border-right: 1px solid var(--md-sys-color-outline-variant, #e5e7eb);
            display: flex;
            flex: 0 0 392px;
            flex-direction: column;
            min-width: 320px;
            max-width: 440px;
            transition: flex-basis 0.18s ease, max-width 0.18s ease, min-width 0.18s ease;
        }

        .i2g-inbox-list-head {
            align-items: center;
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #e5e7eb);
            display: flex;
            justify-content: space-between;
            min-height: 44px;
            padding: 0 1rem;
        }

        .i2g-inbox-list-head__actions {
            align-items: center;
            display: inline-flex;
            gap: 0.5rem;
            min-width: 0;
        }

        .i2g-inbox-list-head__title {
            color: var(--md-sys-color-on-surface, #111827);
            font-size: 0.8125rem;
            font-weight: 700;
        }

        .i2g-inbox-list-head__count {
            color: var(--md-sys-color-on-surface-variant, #64748b);
            font-size: 0.75rem;
        }

        .i2g-inbox-list-toggle {
            align-items: center;
            background: var(--md-sys-color-surface-container-lowest, #fff);
            border: 1px solid var(--md-sys-color-outline-variant, #d9dee3);
            border-radius: 999px;
            color: var(--md-sys-color-on-surface, #111827);
            display: inline-flex;
            flex: 0 0 auto;
            height: 1.75rem;
            justify-content: center;
            padding: 0;
            transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
            width: 1.75rem;
        }

        .i2g-inbox-list-toggle:hover {
            background: var(--md-sys-color-surface-container, #eef2f7);
        }

        .i2g-inbox-list-toggle__icon {
            font-size: 18px !important;
        }

        .i2g-inbox-list {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }

        .i2g-mail-shell.is-list-collapsed .i2g-inbox-list-panel {
            flex-basis: 52px;
            max-width: 52px;
            min-width: 52px;
        }

        .i2g-mail-shell.is-list-collapsed .i2g-inbox-list-head {
            align-items: flex-start;
            border-bottom: 0;
            justify-content: center;
            min-height: 100%;
            padding: 0.75rem 0;
        }

        .i2g-mail-shell.is-list-collapsed .i2g-inbox-list-head__title,
        .i2g-mail-shell.is-list-collapsed .i2g-inbox-list-head__count,
        .i2g-mail-shell.is-list-collapsed .i2g-inbox-list {
            display: none;
        }

        .i2g-inbox-preview {
            background: var(--md-sys-color-surface-container-lowest, #fff);
            flex: 1 1 0%;
            min-width: 0;
            overflow-y: auto;
        }

        .inbox-list-row {
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #eef2f7);
            color: inherit;
        }

        .inbox-list-row:hover {
            background: var(--md-sys-color-surface-container-low, #f8fafc) !important;
        }

        .inbox-list-row.is-unread {
            background: color-mix(in srgb, var(--md-sys-color-primary-container, #dbeafe) 28%, transparent);
        }

        .inbox-list-row.is-active {
            background: color-mix(in srgb, var(--md-sys-color-primary-container, #dbeafe) 72%, transparent) !important;
            box-shadow: inset 3px 0 0 var(--md-sys-color-primary, #1d4ed8);
        }

        .i2g-inbox-empty-preview {
            min-height: 100%;
        }

        .i2g-inbox-status {
            align-items: center;
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #e5e7eb);
            display: flex;
            font-size: 0.8125rem;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
        }

        .i2g-inbox-status--error {
            background: #fef2f2;
            color: #b91c1c;
        }

        .i2g-inbox-empty-state {
            align-items: center;
            color: var(--md-sys-color-on-surface-variant, #64748b);
            display: flex;
            flex: 1 1 auto;
            flex-direction: column;
            justify-content: center;
            min-height: 320px;
            text-align: center;
        }

        .dark .i2g-mail-shell,
        .dark .i2g-mail-toolbar,
        .dark .i2g-mail-account-panel,
        .dark .i2g-inbox-list-panel,
        .dark .i2g-inbox-preview {
            background: var(--md-sys-color-surface-container-lowest, #111827);
        }

        .dark .i2g-mail-toolbar {
            background: var(--md-sys-color-surface-container-low, #1f2937);
        }

        .dark .i2g-inbox-status--error {
            background: color-mix(in srgb, #dc2626 16%, transparent);
            color: #fca5a5;
        }

        #inbox-preview-pane.is-loading {
            opacity: 0.5;
            pointer-events: none;
        }

        @media (max-width: 899px) {
            .i2g-mail-shell { height: auto; min-height: 0; }
            .i2g-mail-toolbar { align-items: flex-start; flex-direction: column; }
            .i2g-mail-toolbar__actions { flex-wrap: wrap; width: 100%; }
            .i2g-mail-toolbar__divider { display: none; }
            .i2g-mail-account-panel { grid-template-columns: 1fr; }
            .i2g-inbox-split { flex-direction: column; min-height: 0; }
            .i2g-inbox-list-panel { flex: none; width: 100%; max-width: none; min-width: 0; max-height: 50vh; }
            .i2g-inbox-preview { border-top: 1px solid var(--md-sys-color-outline-variant, #e5e7eb); min-height: 420px; }
        }

        /* Loading skeleton */
        @keyframes i2g-shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        .i2g-skel {
            border-radius: 4px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 800px 100%;
            animation: i2g-shimmer 1.5s infinite linear;
        }
    </style>
{% endblock %}

{% block content %}
<div id="inbox-all-dynamic" class="w-full max-w-none" data-fragment-url="{{ fragment_url }}">
    <!-- Loading skeleton: shown while JS fetches the real content -->
    <div id="inbox-loading-skeleton">
        <div class="i2g-mail-shell">
            <div class="i2g-mail-toolbar">
                <div class="i2g-mail-toolbar__identity">
                    <div class="i2g-skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="flex flex-col gap-1.5">
                        <div class="i2g-skel" style="width:110px;height:14px;"></div>
                        <div class="i2g-skel" style="width:210px;height:11px;"></div>
                    </div>
                </div>
                <div class="i2g-mail-toolbar__actions">
                    <div class="i2g-skel" style="width:104px;height:32px;border-radius:999px;"></div>
                    <div class="i2g-skel" style="width:122px;height:32px;border-radius:999px;"></div>
                </div>
            </div>
            <div class="i2g-mail-account-panel">
                <div class="i2g-skel" style="width:80%;height:28px;"></div>
                <div class="i2g-skel" style="width:70%;height:28px;"></div>
                <div class="i2g-skel" style="width:50%;height:28px;"></div>
            </div>
            <!-- Split pane skeleton -->
            <div class="i2g-inbox-split">
                <div class="i2g-inbox-list-panel">
                    <div class="i2g-inbox-list-head">
                        <div class="i2g-skel" style="width:80px;height:12px;"></div>
                        <div class="i2g-skel" style="width:72px;height:10px;"></div>
                    </div>
                    <div class="i2g-inbox-list overflow-hidden">
                        {% for _ in "123456789012" %}
                        <div class="flex gap-2.5 px-4 py-3">
                            <div class="i2g-skel shrink-0" style="width:18px;height:18px;margin-top:2px;"></div>
                            <div class="flex-1 flex flex-col gap-1.5">
                                <div class="flex items-center gap-2">
                                    <div class="i2g-skel" style="width:45%;height:12px;"></div>
                                    <div class="i2g-skel ml-auto" style="width:80px;height:10px;"></div>
                                </div>
                                <div class="i2g-skel" style="width:75%;height:12px;"></div>
                                <div class="i2g-skel" style="width:90%;height:10px;"></div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="i2g-inbox-preview flex items-center justify-center">
                    <div class="text-center text-base-400">
                        <span class="material-symbols-outlined !text-[36px] mb-2 block i2g-inbox-refresh-icon" style="animation:i2g-inbox-spin 1s linear infinite;display:inline-block;">sync</span>
                        <p class="text-sm">Loading inbox...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
  'use strict';

  function buildUrl(base, params) {
    var qs = [];
    for (var k in params) {
      if (params[k]) qs.push(k + '=' + encodeURIComponent(params[k]));
    }
    if (!qs.length) return base;
    return base + (base.indexOf('?') === -1 ? '?' : '&') + qs.join('&');
  }

  function getRoot(el) {
    return el ? el.closest('#inbox-all-dynamic') : null;
  }

  var ACCOUNT_COLLAPSE_KEY = 'i2g-inbox-account-collapsed';
  var LIST_COLLAPSE_KEY = 'i2g-inbox-list-collapsed';

  function getStoredAccountCollapsed() {
    try {
      return window.localStorage.getItem(ACCOUNT_COLLAPSE_KEY) === '1';
    } catch (e) {
      return false;
    }
  }

  function storeAccountCollapsed(collapsed) {
    try {
      window.localStorage.setItem(ACCOUNT_COLLAPSE_KEY, collapsed ? '1' : '0');
    } catch (e) {}
  }

  function getStoredListCollapsed() {
    try {
      return window.localStorage.getItem(LIST_COLLAPSE_KEY) === '1';
    } catch (e) {
      return false;
    }
  }

  function storeListCollapsed(collapsed) {
    try {
      window.localStorage.setItem(LIST_COLLAPSE_KEY, collapsed ? '1' : '0');
    } catch (e) {}
  }

  function setAccountCollapsed(root, collapsed) {
    var shell = root ? root.querySelector('.i2g-mail-shell') : null;
    if (!shell) return;

    shell.classList.toggle('is-account-collapsed', collapsed);

    var toggle = shell.querySelector('[data-inbox-account-toggle]');
    if (toggle) {
      toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    }

    var label = shell.querySelector('[data-inbox-account-toggle-label]');
    if (label) {
      label.textContent = collapsed ? 'Show details' : 'Hide details';
    }
  }

  function setListCollapsed(root, collapsed) {
    var shell = root ? root.querySelector('.i2g-mail-shell') : null;
    if (!shell) return;

    shell.classList.toggle('is-list-collapsed', collapsed);

    var toggle = shell.querySelector('[data-inbox-list-toggle]');
    if (toggle) {
      toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      toggle.setAttribute('aria-label', collapsed ? 'Expand message list' : 'Collapse message list');
      toggle.setAttribute('title', collapsed ? 'Expand message list' : 'Collapse message list');
    }

    var icon = shell.querySelector('.i2g-inbox-list-toggle__icon');
    if (icon) {
      icon.textContent = collapsed ? 'chevron_right' : 'chevron_left';
    }
  }

  function applyAccountCollapsedState(root) {
    setAccountCollapsed(root, getStoredAccountCollapsed());
  }

  function applyListCollapsedState(root) {
    setListCollapsed(root, getStoredListCollapsed());
  }

  function applyInboxLayoutState(root) {
    applyAccountCollapsedState(root);
    applyListCollapsedState(root);
    resizePreviewIframe();
  }

  function getLimit(root) {
    var sel = root.querySelector('[data-inbox-limit]');
    return sel ? sel.value : '';
  }

  function getActiveUid(root) {
    var active = root.querySelector('[data-inbox-row].is-active');
    return active ? active.getAttribute('data-uid') : null;
  }

  function hasPreviewContent(root) {
    var content = root.querySelector('#inbox-preview-content');
    if (!content) return false;
    return !content.querySelector('#inbox-preview-empty');
  }

  function mergeListHtml(root, html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;

    function replaceSection(selector) {
      var fresh = tmp.querySelector(selector);
      var current = root.querySelector(selector);
      if (fresh && current) {
        current.replaceWith(fresh);
      } else if (!fresh && current) {
        current.remove();
      } else if (fresh) {
        var shell = root.querySelector('.i2g-mail-shell');
        var split = shell ? shell.querySelector('.i2g-inbox-split') : null;
        if (shell && split) shell.insertBefore(fresh, split);
      }
    }

    replaceSection('.i2g-mail-toolbar');
    replaceSection('[data-inbox-account-panel]');
    replaceSection('[data-inbox-status]');

    var newHead = tmp.querySelector('.i2g-inbox-list-head');
    var oldHead = root.querySelector('.i2g-inbox-list-head');
    if (newHead && oldHead) {
      oldHead.replaceWith(newHead);
    }

    var newList = tmp.querySelector('.i2g-inbox-list');
    var oldList = root.querySelector('.i2g-inbox-list');
    if (newList && oldList) {
      oldList.innerHTML = newList.innerHTML;
    }

    var newSplit = tmp.querySelector('.i2g-inbox-split');
    var oldSplit = root.querySelector('.i2g-inbox-split');
    if (!oldSplit && newSplit) {
      var shell = root.querySelector('.i2g-mail-shell');
      var previewPane = root.querySelector('#inbox-preview-pane');
      if (shell && previewPane) {
        var wrapper = document.createElement('div');
        wrapper.innerHTML = newSplit.outerHTML;
        var freshSplit = wrapper.firstElementChild;
        var freshPreview = freshSplit.querySelector('#inbox-preview-pane');
        if (freshPreview) freshPreview.replaceWith(previewPane);
        shell.appendChild(freshSplit);
      }
    }

    applyInboxLayoutState(root);
  }

  var SCROLL_KEY = 'inbox-list-scroll';

  function saveListScroll(root) {
    var list = root.querySelector('.i2g-inbox-list');
    return list ? list.scrollTop : 0;
  }

  function restoreListScroll(root, top) {
    var list = root.querySelector('.i2g-inbox-list');
    if (list && top) list.scrollTop = top;
  }

  function persistScrollToSession(root) {
    var list = root.querySelector('.i2g-inbox-list');
    if (list) {
      try { sessionStorage.setItem(SCROLL_KEY, String(list.scrollTop)); } catch (e) {}
    }
  }

  function popSessionScroll() {
    try {
      var v = sessionStorage.getItem(SCROLL_KEY);
      sessionStorage.removeItem(SCROLL_KEY);
      return v ? Number(v) : 0;
    } catch (e) { return 0; }
  }

  function fetchInbox(root, params) {
    var url = root.getAttribute('data-fragment-url');
    if (!url) return;
    var activeUid = getActiveUid(root);
    var preservePreview = hasPreviewContent(root);
    var scrollTop = saveListScroll(root);
    var sessionScroll = preservePreview ? 0 : popSessionScroll();
    var btn = root.querySelector('[data-inbox-refresh]');
    if (btn) {
      btn.classList.add('i2g-inbox-refresh--loading');
      btn.setAttribute('disabled', 'disabled');
    }
    fetch(buildUrl(url, params || {}), {
      credentials: 'same-origin',
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
    })
      .then(function (r) { if (!r.ok) throw new Error(); return r.text(); })
      .then(function (html) {
        if (preservePreview) {
          mergeListHtml(root, html);
          if (activeUid) setActiveRow(root, activeUid);
          restoreListScroll(root, scrollTop);
        } else {
          root.innerHTML = html;
          var savedUid = getHashUid();
          if (savedUid) {
            var savedRow = root.querySelector('[data-inbox-row][data-uid="' + savedUid + '"]');
            if (savedRow) {
              loadPreview(root, savedRow);
              restoreListScroll(root, sessionScroll);
            }
          }
        }
        applyInboxLayoutState(root);
      })
      .catch(function () {
        var skel = root.querySelector('#inbox-loading-skeleton');
        if (skel) skel.innerHTML = '<div class="p-8 text-center text-red-600 text-sm">Failed to load inbox. <button data-inbox-refresh class="underline text-primary-600 ml-1">Retry</button></div>';
        else window.alert('Could not refresh inbox.');
      })
      .finally(function () {
        if (btn) { btn.classList.remove('i2g-inbox-refresh--loading'); btn.removeAttribute('disabled'); }
      });
  }

  function setActiveRow(root, uid) {
    root.querySelectorAll('[data-inbox-row]').forEach(function (r) {
      r.classList.toggle('is-active', r.getAttribute('data-uid') === uid);
    });
  }

  function initPreviewIframe(container) {
    var dataEl = container.querySelector('#inbox-preview-body-data');
    var iframe = container.querySelector('#inbox-preview-body');
    if (!dataEl || !iframe) return;
    try {
      iframe.onload = function () {
        resizePreviewIframe();
        watchPreviewIframeAssets(iframe);
      };
      iframe.srcdoc = JSON.parse(dataEl.textContent);
    } catch (e) {}
    window.setTimeout(resizePreviewIframe, 50);
  }

  function getPreviewIframeHeight(iframe) {
    try {
      var doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
      if (!doc) return 0;

      if (doc.documentElement) doc.documentElement.style.overflow = 'hidden';
      if (doc.body) doc.body.style.overflow = 'hidden';

      var body = doc.body;
      var html = doc.documentElement;
      if (!body || !html) return 0;

      return Math.max(
        body.scrollHeight,
        body.offsetHeight,
        html.clientHeight,
        html.scrollHeight,
        html.offsetHeight
      );
    } catch (e) {
      return 0;
    }
  }

  function watchPreviewIframeAssets(iframe) {
    try {
      var doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
      if (!doc) return;

      var images = doc.querySelectorAll('img');
      images.forEach(function (image) {
        if (!image.complete) {
          image.addEventListener('load', resizePreviewIframe, { once: true });
          image.addEventListener('error', resizePreviewIframe, { once: true });
        }
      });
    } catch (e) {}
  }

  function resizePreviewIframe() {
    var iframe = document.getElementById('inbox-preview-body');
    if (!iframe) return;
    var contentHeight = getPreviewIframeHeight(iframe);
    iframe.style.height = Math.max(contentHeight, 240) + 'px';
  }

  function getHashUid() {
    var m = location.hash.match(/^#msg=(.+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function setHashUid(uid) {
    if (uid) {
      history.replaceState(null, '', '#msg=' + encodeURIComponent(uid));
    } else {
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  function loadPreview(root, row) {
    var pane = root.querySelector('#inbox-preview-pane');
    var content = root.querySelector('#inbox-preview-content');
    if (!pane || !content) return;

    var url = row.getAttribute('data-preview-url');
    var uid = row.getAttribute('data-uid');
    if (!url) return;

    setActiveRow(root, uid);
    setHashUid(uid);

    content.innerHTML = '<div class="flex flex-col items-center justify-center text-base-400" style="min-height:200px;"><span class="material-symbols-outlined !text-[36px] mb-2 block" style="animation:i2g-inbox-spin 1s linear infinite;display:inline-block;">sync</span><p class="text-sm">Loading message...</p></div>';
    pane.classList.add('is-loading');

    fetch(url, {
      credentials: 'same-origin',
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
    })
      .then(function (r) { if (!r.ok) throw new Error(); return r.text(); })
      .then(function (html) {
        content.innerHTML = html;
        initPreviewIframe(content);
      })
      .catch(function () {
        content.innerHTML = '<div class="p-4 text-sm text-red-600">Failed to load message.</div>';
      })
      .finally(function () {
        pane.classList.remove('is-loading');
      });
  }

  /* Reply in preview pane (below the email) */

  function loadReplyForm(replyArea, url) {
    replyArea.innerHTML = '<div class="flex items-center justify-center text-base-400 py-6"><span class="material-symbols-outlined !text-[24px] mr-2" style="animation:i2g-inbox-spin 1s linear infinite;display:inline-block;">sync</span><span class="text-sm">Loading reply form...</span></div>';
    replyArea.style.display = 'block';
    fetch(url, {
      credentials: 'same-origin',
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
    })
      .then(function (r) { if (!r.ok) throw new Error(); return r.text(); })
      .then(function (html) {
        replyArea.innerHTML = html;
        replyArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      })
      .catch(function () {
        replyArea.innerHTML = '<div class="p-4 text-sm text-red-600">Failed to load reply form.</div>';
      });
  }

  function submitReplyForm(form, replyArea) {
    var actionUrl = form.getAttribute('data-action');
    if (!actionUrl) return;
    var sendBtn = form.querySelector('[data-inbox-send-btn]');
    var statusEl = form.querySelector('[data-inbox-reply-status]');

    if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = 'Sending...'; }
    if (statusEl) { statusEl.className = 'mt-2 text-sm hidden'; statusEl.textContent = ''; }

    var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');
    if (!csrfToken) csrfToken = document.cookie.match(/csrftoken=([^;]+)/);

    var body = new FormData(form);
    var headers = { 'X-Requested-With': 'XMLHttpRequest' };
    var csrfValue = csrfToken ? (csrfToken.value || csrfToken[1]) : '';
    if (csrfValue) headers['X-CSRFToken'] = csrfValue;

    fetch(actionUrl, {
      method: 'POST',
      credentials: 'same-origin',
      headers: headers,
      body: body,
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok) {
          replyArea.innerHTML = '<div class="flex items-center gap-2 py-4 text-green-600"><span class="material-symbols-outlined !text-[20px]">check_circle</span><span class="text-sm font-medium">' + data.message + '</span></div>';
        } else {
          if (statusEl) {
            statusEl.className = 'mt-2 text-sm text-red-600';
            statusEl.textContent = data.error || 'Failed to send.';
          }
          if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = 'Send Reply'; }
        }
      })
      .catch(function () {
        if (statusEl) {
          statusEl.className = 'mt-2 text-sm text-red-600';
          statusEl.textContent = 'Network error. Please try again.';
        }
        if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = 'Send Reply'; }
      });
  }

  /* Event delegation */

  document.body.addEventListener('click', function (e) {
    var listToggle = e.target.closest('[data-inbox-list-toggle]');
    if (listToggle) {
      e.preventDefault();
      var listRoot = getRoot(listToggle);
      if (!listRoot) return;
      var listShell = listRoot.querySelector('.i2g-mail-shell');
      var nextListCollapsed = listShell ? !listShell.classList.contains('is-list-collapsed') : false;
      setListCollapsed(listRoot, nextListCollapsed);
      storeListCollapsed(nextListCollapsed);
      resizePreviewIframe();
      return;
    }

    var accountToggle = e.target.closest('[data-inbox-account-toggle]');
    if (accountToggle) {
      e.preventDefault();
      var accountRoot = getRoot(accountToggle);
      if (!accountRoot) return;
      var accountShell = accountRoot.querySelector('.i2g-mail-shell');
      var nextCollapsed = accountShell ? !accountShell.classList.contains('is-account-collapsed') : false;
      setAccountCollapsed(accountRoot, nextCollapsed);
      storeAccountCollapsed(nextCollapsed);
      return;
    }

    var btn = e.target.closest('[data-inbox-refresh]');
    if (btn) {
      e.preventDefault();
      var root = getRoot(btn);
      if (root) fetchInbox(root, { limit: getLimit(root), refresh: '1' });
      return;
    }

    // Reply link → load form into #inbox-reply-area (below email)
    var replyLink = e.target.closest('[data-inbox-reply-link]');
    if (replyLink) {
      e.preventDefault();
      var replyArea = document.getElementById('inbox-reply-area');
      if (replyArea) {
        replyLink.style.display = 'none';
        loadReplyForm(replyArea, replyLink.getAttribute('data-inbox-reply-link'));
      }
      return;
    }

    // Toggle Cc field
    var ccToggle = e.target.closest('[data-toggle-cc]');
    if (ccToggle) {
      e.preventDefault();
      var ccRow = document.querySelector('[data-cc-row]');
      if (ccRow) {
        var visible = ccRow.style.display !== 'none';
        ccRow.style.display = visible ? 'none' : 'flex';
        ccToggle.style.display = visible ? '' : 'none';
        if (!visible) ccRow.querySelector('input').focus();
      }
      return;
    }

    // Cancel reply → just clear the reply area
    var cancelBtn = e.target.closest('[data-inbox-cancel-reply]');
    if (cancelBtn) {
      e.preventDefault();
      var replyArea = document.getElementById('inbox-reply-area');
      if (replyArea) replyArea.innerHTML = '';
      var replyLink = document.querySelector('[data-inbox-reply-link]');
      if (replyLink) replyLink.style.display = '';
      return;
    }

    var row = e.target.closest('[data-inbox-row]');
    if (row) {
      e.preventDefault();
      var root = getRoot(row);
      if (!root) return;
      var pane = root.querySelector('#inbox-preview-pane');
      if (pane) {
        loadPreview(root, row);
      } else {
        window.location.href = row.getAttribute('href');
      }
    }
  });

  // Reply form submission
  document.body.addEventListener('submit', function (e) {
    var form = e.target.closest('[data-inbox-reply-form]');
    if (form) {
      e.preventDefault();
      var replyArea = document.getElementById('inbox-reply-area');
      if (replyArea) submitReplyForm(form, replyArea);
    }
  });

  document.body.addEventListener('change', function (e) {
    var sel = e.target.closest('[data-inbox-limit]');
    if (!sel) return;
    var root = getRoot(sel);
    if (root) fetchInbox(root, { limit: getLimit(root) });
  });

  /* Auto-load on page ready */
  var root = document.getElementById('inbox-all-dynamic');
  if (root) fetchInbox(root, {});

  window.addEventListener('resize', resizePreviewIframe);

  window.addEventListener('beforeunload', function () {
    var r = document.getElementById('inbox-all-dynamic');
    if (r) persistScrollToSession(r);
  });
})();
</script>
{% endblock %}
