<script>
    (function () {
        Chart.register(ChartDataLabels);
        const labels = [{% for day in last_7_days %}"{{ day.date|date:'M d' }}"{% if not forloop.last %},{% endif %}{% endfor %}];
        const viewsData = [{% for day in last_7_days %}{{ day.count }}{% if not forloop.last %},{% endif %}{% endfor %}];
        const visitorsData = [{% for v in last_7_days_visitors %}{{ v }}{% if not forloop.last %},{% endif %}{% endfor %}];
        const theme = window.i2gPageViewTheme;
        const colors = theme.palette();

        function applyTheme(chart, palette) {
            chart.data.datasets[0].backgroundColor = palette.primaryBar;
            chart.data.datasets[0].datalabels.color = palette.textColor;
            chart.data.datasets[1].borderColor = palette.orangeLine;
            chart.data.datasets[1].pointBackgroundColor = palette.orangeLine;
            chart.data.datasets[1].datalabels.color = palette.orangeLine;
            chart.options.plugins.legend.labels.color = palette.textColor;
            chart.options.plugins.tooltip.backgroundColor = palette.tooltipBg;
            chart.options.plugins.tooltip.titleColor = palette.titleColor;
            chart.options.plugins.tooltip.bodyColor = palette.textColor;
            chart.options.plugins.tooltip.borderColor = palette.gridColor;
            chart.options.scales.x.ticks.color = palette.textColor;
            chart.options.scales.y.grid.color = palette.gridColor;
            chart.options.scales.y.ticks.color = palette.textColor;
        }

        const chart = new Chart(document.getElementById('last7DaysChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Page Views', data: viewsData, backgroundColor: colors.primaryBar, borderRadius: 4, borderSkipped: false, maxBarThickness: 48, datalabels: {anchor: 'end', align: 'top', color: colors.textColor, font: {size: 10, weight: 'bold'}, display: function (ctx) { return ctx.dataset.data[ctx.dataIndex] > 0; }} },
                    { label: 'Unique Visitors', type: 'line', data: visitorsData, borderColor: colors.orangeLine, backgroundColor: 'transparent', borderWidth: 2, pointRadius: 4, pointBackgroundColor: colors.orangeLine, tension: 0.3, datalabels: {anchor: 'end', align: 'top', color: colors.orangeLine, font: {size: 9}, display: function (ctx) { return ctx.dataset.data[ctx.dataIndex] > 0; }} }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: {mode: 'index', intersect: false},
                plugins: {
                    legend: {display: true, labels: {color: colors.textColor, boxWidth: 12, font: {size: 11}}},
                    tooltip: {
                        backgroundColor: colors.tooltipBg,
                        titleColor: colors.titleColor,
                        bodyColor: colors.textColor,
                        borderColor: colors.gridColor,
                        borderWidth: 1,
                        padding: 10,
                        cornerRadius: 6,
                        displayColors: true,
                        callbacks: {label: function (ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y + (ctx.dataset.label === 'Page Views' ? ' views' : ' visitors'); }}
                    }
                },
                scales: {
                    x: {grid: {display: false}, ticks: {color: colors.textColor, font: {size: 11}}, border: {display: false}},
                    y: {beginAtZero: true, grid: {color: colors.gridColor}, ticks: {color: colors.textColor, font: {size: 11}, precision: 0, maxTicksLimit: 6}, border: {display: false}}
                }
            }
        });

        theme.register(chart, applyTheme);
    })();
</script>
