<script>
    (function () {
        const labels = [{% for h in hourly_views %}"{{ h.hour }}:00"{% if not forloop.last %},{% endif %}{% endfor %}];
        const data = [{% for h in hourly_views %}{{ h.count }}{% if not forloop.last %},{% endif %}{% endfor %}];
        const isDark = document.documentElement.classList.contains('dark');
        const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
        const textColor = isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)';

        new Chart(document.getElementById('hourlyChart'), {
            type: 'bar',
            data: {labels: labels, datasets: [{label: 'Views', data: data, backgroundColor: isDark ? 'rgba(45,212,191,0.6)' : 'rgba(20,184,166,0.7)', borderRadius: 3, borderSkipped: false}]},
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: {mode: 'index', intersect: false},
                plugins: {
                    legend: {display: false},
                    datalabels: {anchor: 'end', align: 'top', color: textColor, font: {size: 9}, display: function (ctx) { return ctx.dataset.data[ctx.dataIndex] > 0; }},
                    tooltip: {
                        backgroundColor: isDark ? '#1e1e2e' : '#fff',
                        titleColor: isDark ? '#e2e8f0' : '#1e293b',
                        bodyColor: isDark ? '#cbd5e1' : '#475569',
                        borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
                        borderWidth: 1,
                        padding: 10,
                        cornerRadius: 6,
                        displayColors: false,
                        callbacks: {label: function (ctx) { return ctx.parsed.y + ' views'; }}
                    }
                },
                scales: {
                    x: {grid: {display: false}, ticks: {color: textColor, font: {size: 9}, maxRotation: 0, callback: function (val, idx) { return idx % 3 === 0 ? this.getLabelForValue(val) : ''; }}, border: {display: false}},
                    y: {beginAtZero: true, grid: {color: gridColor}, ticks: {color: textColor, font: {size: 11}, precision: 0, maxTicksLimit: 5}, border: {display: false}}
                }
            }
        });
    })();
</script>
