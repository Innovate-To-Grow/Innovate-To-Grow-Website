{% extends "admin/change_list.html" %}

{% block object-tools-items %}
  <div class="flex flex-row items-center gap-2">
    <form method="post" action="{{ publish_all_url }}" class="inline">
      {% csrf_token %}
      <button type="submit" class="bg-green-600 flex items-center gap-2 h-[38px] justify-center -my-1 rounded-full px-4 text-white text-sm font-medium hover:bg-green-700 transition-colors" title="Publish All Semesters">
        <span class="material-symbols-outlined text-white !text-[20px]">publish</span>
        Publish All
      </button>
    </form>
    <a href="{{ sync_sheets_url }}" class="bg-blue-600 flex items-center gap-2 h-[38px] justify-center -my-1 rounded-full px-4 text-white text-sm font-medium hover:bg-blue-700 transition-colors" title="Sync from Google Sheets">
      <span class="material-symbols-outlined text-white !text-[20px]">sync</span>
      Sync Sheets
    </a>
    <a href="{{ import_url }}" class="bg-primary-600 flex items-center gap-2 h-[38px] justify-center -my-1 rounded-full px-4 text-white text-sm font-medium hover:bg-primary-700 transition-colors" title="Import Excel">
      <span class="material-symbols-outlined text-white !text-[20px]">upload_file</span>
      Import Excel
    </a>
  </div>
  {{ block.super }}
{% endblock %}
