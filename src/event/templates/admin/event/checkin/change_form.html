{% extends "admin/change_form.html" %}
{% load i18n %}

{% block field_sets %}
{% if original %}
<div style="margin-bottom:1.5rem;padding:1rem 1.25rem;background:#f0f4f8;border:1px solid #dbe3ef;border-radius:10px;display:flex;align-items:center;justify-content:space-between;">
  <div>
    <strong style="font-size:1rem;color:#003366;">Check-in Console</strong>
    <p style="margin:0.25rem 0 0;font-size:0.85rem;color:#6b7280;">
      Use the dedicated console for live check-in.
      <strong>{{ original.scan_count }}</strong> scanned at this station.
    </p>
  </div>
  <a
    href="{% url 'admin:event_checkin_scanner' original.pk %}"
    target="_blank"
    style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.625rem 1.25rem;background:#003366;color:#fff;font-weight:600;font-size:0.9rem;border-radius:8px;text-decoration:none;white-space:nowrap;"
  >
    Open Check-in Console
  </a>
</div>
{% endif %}
{{ block.super }}
{% endblock %}
