<script>
    (function () {
        {% if show_recipient_settings %}
            var radios = document.querySelectorAll('input[name="recipient_source"]');
            var eventRow = document.getElementById('event-row');
            var unsubRow = document.getElementById('unsub-row');
            var toRow = document.getElementById('to-row');
            var ccRow = document.getElementById('cc-row');
            var bccRow = document.getElementById('bcc-row');
            var personalizeHint = document.getElementById('personalize-hint');

            function updateVisibility() {
                var selected = document.querySelector('input[name="recipient_source"]:checked');
                var val = selected ? selected.value : 'manual';
                var isManual = (val === 'manual');
                eventRow.style.display = val === 'event' ? '' : 'none';
                unsubRow.style.display = isManual ? 'none' : '';
                toRow.style.display = isManual ? '' : 'none';
                ccRow.style.display = isManual ? '' : 'none';
                bccRow.style.display = isManual ? '' : 'none';
                personalizeHint.style.display = isManual ? 'none' : '';
            }

            radios.forEach(function (radio) { radio.addEventListener('change', updateVisibility); });
            updateVisibility();
        {% endif %}

        {% if preview_url %}
            document.getElementById('preview-btn').addEventListener('click', function (event) {
                event.preventDefault();
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = '{{ preview_url }}';
                form.target = '_blank';
                [['csrfmiddlewaretoken', '{{ csrf_token }}'], ['body', document.getElementById('id_body').value]].forEach(function (pair) {
                    var input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = pair[0];
                    input.value = pair[1];
                    form.appendChild(input);
                });
                var unsubCheckbox = document.getElementById('id_include_unsubscribe_link');
                if (unsubCheckbox && unsubCheckbox.checked) {
                    var unsubInput = document.createElement('input');
                    unsubInput.type = 'hidden';
                    unsubInput.name = 'include_unsubscribe_link';
                    unsubInput.value = 'on';
                    form.appendChild(unsubInput);
                }
                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);
            });
        {% endif %}
    })();
</script>
