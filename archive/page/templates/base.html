<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="alternate" type="application/rss+xml" title="Innovate To Grow RSS"
          href="https://innovatetogrow.ucmerced.edu/rss.xml">
    <link rel="shortcut icon" href="/static/images/i2glogo.png"
          type="image/vnd.microsoft.icon">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
          integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN"
          crossorigin="anonymous">
    <link type="text/css" rel="stylesheet" href="/static/css/drupal-core.css" media="all">
    <link type="text/css" rel="stylesheet" href="/static/css/jquery-ui.css" media="all">
    <link type="text/css" rel="stylesheet" href="/static/css/jquery-ui-timepicker.css" media="screen">
    <link type="text/css" rel="stylesheet" href="/static/css/date-module.css" media="all">
    <link type="text/css" rel="stylesheet" href="/static/css/theme-open-framework.css" media="all">
    <link type="text/css" rel="stylesheet" href="/static/css/i2g-archive.css" media="all">
    <!-- Shared Sheets-escaping helpers; must load before any event script. -->
    <script type="text/javascript" src="/static/js/sheet-safe.js"></script>
    {% block head_extra %}{% endblock %}
</head>

<body class="html front not-logged-in no-sidebars page-node i2g-center">
<div id="main" class="clearfix main" role="main">
    <div class="container">
        <div id="main-content" class="row main-content">
            <div id="content" class="mc-content span12">
                <div id="content-wrapper" class="content-wrapper">
                    <div id="content-head" class="row-fluid content-head">
{% block content %}{% endblock %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/siteimprove.js" async></script>
<script type="text/javascript" src="/static/js/drupal-core.js"></script>
<script type="text/javascript" src="/static/js/jquery-ui.js"></script>
<script type="text/javascript" src="/static/js/event-date.js"></script>
<script type="text/javascript" src="/static/js/colorbox.js"></script>
<script type="text/javascript" src="/static/js/theme-open-framework.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"
        integrity="sha384-i61gTtaoovXtAbKjo903+O55Jkn2+RtzHtvNez+yI49HAASvznhe9sZyjaSHTau9"
        crossorigin="anonymous"></script>
<script type="text/javascript" charset="utf8"
        src="https://cdn.datatables.net/1.12.1/js/jquery.dataTables.min.js"
        integrity="sha384-ZuLbSl+Zt/ry1/xGxjZPkp9P5MEDotJcsuoHT0cM8oWr+e1Ide//SZLebdVrzb2X"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"
        integrity="sha384-v9EFJbsxLXyYar8TvBV8zu5USBoaOC+ZB57GzCmQiWfgDIjS+wANZMP5gjwMLwGv"
        crossorigin="anonymous"></script>
<script src="https://cdn.datatables.net/buttons/2.2.2/js/buttons.html5.min.js"
        integrity="sha384-0RqPR2pS8PZtdf2dUWHpI+Um4DsvovzRAZPEZg7lXp4/HhxUBq0Y8VPYBE902L4u"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"
        integrity="sha384-HUHsYVOhSyHyZRTWv8zkbKVk7Xmg12CCNfKEUJ7cSuW/22Lz3BITd3Om6QeiXICb"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"
        integrity="sha384-UAA3vlTPq9dwxB61awBFhR7Y5uBFOKQWuZueu4C6uI48gjIoqI/OTmYWEYWZXbGR"
        crossorigin="anonymous"></script>
<script src="https://cdn.datatables.net/buttons/2.2.2/js/buttons.print.min.js"
        integrity="sha384-mOGjUrCoMJ8/pGqc8SQHuJdYPrdB9cjSkiuLQbw6D7orbJyMkk6xYDlYtkEH051d"
        crossorigin="anonymous"></script>
<script src="https://cdn.datatables.net/select/1.4.0/js/dataTables.select.min.js"
        integrity="sha384-ciSNvZMn/ZSRBeE3M3OcMMoPXc8l9agJUSZOJUisImdZhTnrWCIVHAAKCrbDbj9W"
        crossorigin="anonymous"></script>
{% block page_scripts %}{% endblock %}
<script src="/static/js/i2g-embed.js"></script>
</body>
</html>
