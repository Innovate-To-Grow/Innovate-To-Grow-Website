{% extends 'admin/master.html' %}
{% block body %}

<h4> Click the button below to start documenting bounces within the SQS queue </h4> 
<h4> Please do not spam the button, it will take some time to catch all the bounces </h4> 
<br>
<form action="{{ url_for('catch_bounces.start') }}" method=post>
    <input type="submit" id="submit" value="Catch Bounces" class="btn btn-default">
</form>

<script>
    const submitBtn = document.getElementById("submit");
    submitBtn.addEventListener("click", function() {
      submitBtn.style.pointerEvents = "none";
  
      setTimeout(function() {
        submitBtn.style.pointerEvents = "auto";
      }, 3000);
    });
</script>

{% endblock body%}
