{% extends "membership/layout.html" %}
{% import "membership/render_helper.html" as forms %}

{% block content %}

<div>
  <h2 >Please enter your email to register for the event</h2>
</div>
<form action="{{ url_for('events.enter_email', event_name=event.name) }}" method=post>
  {{ form.hidden_tag() }}
  <div class="input-row">
    {{ forms.render(form) }}
  </div>
<div class="submit-container">
  {{ form.submit }}
  <br>
</div>
  
</form>

<script>
  const submitBtn = document.getElementById("submit");
  submitBtn.addEventListener("click", function() {
    submitBtn.style.pointerEvents = "none";

    setTimeout(function() {
      submitBtn.style.pointerEvents = "auto";
    }, 5000);
  });
</script>

{% endblock %}
