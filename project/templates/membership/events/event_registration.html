{% extends "membership/layout.html" %}
{% import "membership/render_helper.html" as forms %}

{% block content %}

<form action="{{ url_for('events.event_register', event_name=event.name, token=token) }}" method=post>
  {{ form.hidden_tag() }}

  {{ forms.render(form) }}

  <br>
  {{ form.submit }}
  <br>
</form>
{% endblock %}
