<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        form { display: flex; flex-direction: column; }
        input[type=text], input[type=password] { padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; }
        input[type=submit] { background-color: #4CAF50; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        input[type=submit]:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm" method="post">
            <label for="email">Email:</label>
            <input type="email" id="email" required><br>
            <label for="password">Password:</label>
            <input type="password" id="password" required><br>
            <input type="submit" value="Login">
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "***REMOVED_GOOGLE_API_KEY***",
            authDomain: "stafflogin-d6a0c.firebaseapp.com",
            projectId: "stafflogin-d6a0c",
            storageBucket: "stafflogin-d6a0c.appspot.com",
            messagingSenderId: "669480379343",
            appId: "1:669480379343:web:66f74c13e8afaef46c68ba",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', (event) => {
            event.preventDefault(); // Prevent the form from submitting normally

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Signed in
                    // Store the user's email in sessionStorage to indicate they are logged in
                    const uid = userCredential.user.uid;
                    window.location.href = './uM1GxRv586F0MXg3DtVU78BQZnMvLWr6gD4p3Fe36M8x7Sf1gEyFL1HLeXPwVvCyWcKzQecJ45CfQXVNiNG2tFj8wvJuPT5SfUtu7YA7BVWVbWWY73bnWn4j85tX7ZJkbdf7Tfa5mB9JqgmewjHgwGSyUtqwhSdLSeKRn3GH61Vnhpq0tNMSwknFwCyWq97BxEExej2SkFMEDTSLki'; //?userId=$:{uid}; // Redirect to the protected page
                })
                .catch((error) => {
                    const errorMessage = error.message;
                    alert(errorMessage); // Show error message
                });
        });
    </script>
</body>
</html>
