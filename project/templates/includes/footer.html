{% macro footer() %}
<style>
    .footer__bg {
  right: 0;
  bottom: 0;
  left: 0;
  background-color: #f2f2f2;
  overflow-y: hidden;
}

.content-wrapper {
  margin: 0 auto;
  max-width: 87.5rem;
}

.content-margin {
  margin: 0 auto;
  max-width: 95%;
}

.parent__content-box--has-flex-col {
  display: flex;
  flex-direction: column;
  padding: 1.25em 0;
}

.child-parent__primary-col {
  display: flex;
  flex-direction: column;
  margin: 3.75em 0;
}

div.child__primary-row-items {
  align-self: center;
}
div.child__primary-row-items a {
  margin: 0 3.125em;
  display: inline-block;
}
div.child__primary-row-items a i {
  font-size: 3.125rem;
  color: #fafafa;
}
div.child__primary-row-items a span {
  display: none;
}
div.child__primary-row-items a:hover {
  opacity: 0.8;
}
div.child__primary-row-items a:active {
  opacity: 0.95;
}

.child-parent__secondary-col--has-flex-row {
  display: flex;
  justify-content: space-between;
  border-top: 1px ridge rgba(204, 204, 204, 0.4);
  border-bottom: 1px ridge rgba(204, 204, 204, 0.4);
  padding: 1.25em 0;
}

ul.child__primary-row-items {
  display: flex;
}
ul.child__primary-row-items li:not(:last-child)::after {
  position: absolute;
  top: 0;
  right: 12.8%;
  bottom: 0;
  font-weight: 900;
  color: #0f2d52;
  content: "-";
}
ul.child__primary-row-items li {
  position: relative;
  padding-right: 1.563em;
}
ul.child__primary-row-items li a {
  font: 1rem "Verdana";
  color: #0f2d52;
  text-decoration: none;
}
ul.child__primary-row-items li a:hover {
  opacity: 0.8;
}
ul.child__primary-row-items li a:active {
  opacity: 0.95;
}

.child__copyright {
  font: 1rem "Verdana";
  color: #0f2d52;
  opacity: 0.75;
}

@media screen and (max-width: 48em) {
  .child-parent__primary-col {
    margin: 3.125em 0;
  }

  div.child__primary-row-items a {
    margin: 0 clamp(1.563em, 6.9vw, 3.125em);
  }

  .child-parent__secondary-col--has-flex-row {
    justify-content: center;
    border-bottom: unset;
    padding-bottom: unset;
  }

  ul.child__primary-row-items li a:active {
    text-decoration: underline;
    text-underline-offset: 0.25em;
  }
}
@media screen and (max-width: 30em) {
  div.child__primary-row-items {
    display: flex;
    flex-direction: column;
  }
  div.child__primary-row-items a {
    display: flex;
    align-items: center;
    margin: 0 0 0.9375em;
    text-decoration: none;
  }
  div.child__primary-row-items a i {
    margin-right: 0.46875em;
    font-size: 2rem;
  }
  div.child__primary-row-items a span {
    display: inline;
    font: 1rem "Verdana";
    color: #0f2d52;
  }
  div.child__primary-row-items a:last-child {
    margin-bottom: 0;
  }
  div.child__primary-row-items a:active span {
    text-decoration: underline;
    text-underline-offset: 0.25em;
  }

  .child-parent__secondary-col--has-flex-row {
    flex-direction: column;
    align-items: center;
  }

  .child__copyright {
    margin-top: 0.625em;
    font-size: 0.906rem;
  }
}
</style>

<footer class="footer__bg">
    <div class="content-wrapper">
      <div class="content-margin">
        <div class="parent__content-box--has-flex-col">
          <div class="child-parent__secondary-col--has-flex-row">
            <ul class="child__primary-row-items">
              <li><a href="{{ url_for('home.mainpage') }}">Home</a></li>
              <li><a href="{{ url_for('home.about') }}">Contact</a></li>
            </ul><span class="child__copyright">&copy; 2022 I2G</span>
          </div>
        </div>
      </div>
    </div>
  </footer>
{% endmacro %}
