{% extends "layout.html" %}
{% import "render_helper.html" as forms %}

{% block content %}
<h2>Fill out your information below</h2>
<h2>Please enter the email address of the account you wish to update</h2>
<form action="{{ url_for('update.enter_email') }}" method=post>
  {{ form.hidden_tag() }}

  {{ forms.render(form) }}

  <br>
  {{ form.submit }}
  <br>
</form>
{% endblock %}
