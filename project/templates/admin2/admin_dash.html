{% extends 'admin2/base.html' %}

{% block title %}CHECK IN{% endblock %}

{% block admin_button %}
    <a href="/logout" class="btn btn-primary">Logout</a>
{% endblock %}

{% block head %}
<style>
    /* Table styling */
    table {
        width: 50%; /* Set the width to 50% */
        margin: 0 auto; /* Center the table horizontally */
        border-collapse: collapse;
        border-spacing: 0;
        border: 1px solid #ddd; /* Add border */
    }
    th, td {
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }
    th {
        background-color: #f2f2f2;
    }
    tr:hover {
        background-color: #f5f5f5;
    }
    /* Search input styling */
    #searchInput {
        padding: 8px;
        margin-bottom: 10px;
        width: 100%; /* Set width to 100% */
        box-sizing: border-box;
    }

    .btn-primary {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        background-color: #ffc107;
        color: white;
        cursor: pointer;
        text-decoration: none;
    }

    .remove-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        background-color: #dc3545;
        color: white;
        cursor: pointer;
        text-decoration: none;
    }

    .btn-container {
        display: flex; /* Use flexbox */
        align-items: center; /* Align items vertically */
    }

    .btn-container .remove-btn {
        margin-left: 10px; /* Add margin between input and button */
    }
</style>

{% endblock %}

{% block content %}

<h1>Admin Dashboard</h2>

<h2><a href="/signup" class="btn btn-primary">Add Staff</a></h2>

<h2><a href="/admin/" class="btn btn-primary">Database</a></h2>

<!--<h2><a href="/logout" class="btn btn-primary">logout</a></h2>-->

<h2>Registered Staff</h2>

<div>
    <form id="removeUserForm" method="POST" action="/remove_firebase_user">
        <div class="btn-container">
            <input type="text" id="searchInput" name="email" placeholder="Search by Email" onkeyup="searchByEmail()">
            <!--<button type="button" class="remove-btn" onclick="removeStaff()">Remove</button>-->
        </div>
    </form>
</div>

<table id="staffLoginsTable">
    <thead>
        <tr>
            <th>Email</th>
            <th>User ID</th>
            <th>Action</th> <!-- New column for remove button -->
        </tr>
    </thead>
    <tbody>
        <!-- Table rows will be added dynamically using JavaScript -->
    </tbody>
</table>

<script>
    // Function to fetch data from the server and populate the table
    async function fetchDataAndPopulateTable() {
        const response = await fetch('/view_staff_logins');
        const data = await response.json();

        const tableBody = document.querySelector('#staffLoginsTable tbody');
        tableBody.innerHTML = ''; // Clear existing rows

        data.forEach(entry => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${entry.email}</td>
                <td>${entry.uid}</td>
                <td><button class="remove-btn" onclick="removeStaff('${entry.email}')">Remove</button></td> <!-- New remove button -->
            `;
            tableBody.appendChild(row);
        });
    }

    // Call the function to fetch data and populate the table when the page loads
    window.onload = fetchDataAndPopulateTable;

    // Function to remove staff member
    function removeStaff(email) {
        if (confirm(`Are you sure you want to remove the staff member with email: ${email}?`)) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/remove_firebase_user';
            form.style.display = 'none';

            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'email';
            input.value = email;
            form.appendChild(input);

            document.body.appendChild(form);
            form.submit();
        }
    }
</script>


{% endblock %}
